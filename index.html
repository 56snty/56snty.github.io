<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>LOWKEY — QUANTUM</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root { --red: #FF003C; --w: #ffffff; --b: #030303; }
* { margin: 0; padding: 0; box-sizing: border-box; user-select: none; touch-action: none; -webkit-tap-highlight-color: transparent; }
html, body { background: var(--b); color: var(--w); overflow: hidden; width: 100vw; height: 100vh; cursor: crosshair; font-family: 'Space Mono', monospace; -webkit-font-smoothing: antialiased; }

#cv { position: fixed; inset: 0; z-index: 1; }
.vig { position: fixed; inset: 0; z-index: 50; pointer-events: none; background: radial-gradient(circle at 50% 50%, transparent 20%, rgba(3,3,4,0.98) 100%); }
.scan { position: fixed; inset: 0; z-index: 52; pointer-events: none; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px); }

#boot { position: fixed; inset: 0; z-index: 800; background: var(--b); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 40px; transition: opacity 1.5s ease; }
#boot.gone { opacity: 0; pointer-events: none; }
.bmark { font-family: 'Bebas Neue', sans-serif; font-size: clamp(50px, 12vw, 120px); letter-spacing: 0.1em; color: var(--w); }
.bsub { font-size: 10px; letter-spacing: 0.4em; color: rgba(255,255,255,0.3); text-transform: uppercase; }
.bline { width: min(250px, 60vw); height: 1px; background: rgba(255,255,255,0.1); position: relative; overflow: hidden; }
.bprog { position: absolute; inset: 0; background: var(--red); width: 0%; transition: width 2s cubic-bezier(0.8,0,0.2,1); }

.hud { position: fixed; inset: 0; z-index: 100; pointer-events: none; padding: env(safe-area-inset-top, 30px) env(safe-area-inset-right, 30px) env(safe-area-inset-bottom, 30px) env(safe-area-inset-left, 30px); display: flex; flex-direction: column; justify-content: space-between; mix-blend-mode: difference; }
.htop { display: flex; justify-content: space-between; align-items: flex-start; }
.brand { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 0.3em; color: rgba(255,255,255,0.9); opacity: 0; transition: opacity 2s 0.5s; }
.brand span { color: var(--red); }
.snum { font-size: 10px; letter-spacing: 0.2em; color: rgba(255,255,255,0.4); opacity: 0; transition: color 0.3s, opacity 2s 0.7s; text-align: right; }
.brand.on, .snum.on { opacity: 1; }
.hbot { display: flex; align-items: center; gap: 20px; opacity: 0; transition: opacity 2s 0.9s; }
.hbot.on { opacity: 1; }
.vv { font-size: 10px; letter-spacing: 0.1em; color: var(--red); width: 90px; font-variant-numeric: tabular-nums; font-weight: 700; }
.pbar { flex: 1; height: 1px; background: rgba(255,255,255,0.15); position: relative; }
.pfill { position: absolute; inset-block: 0; left: 0; background: var(--red); width: 0%; box-shadow: 0 0 10px var(--red); }
.phead { position: absolute; top: -4px; width: 9px; height: 9px; background: #fff; border-radius: 50%; transform: translateX(-50%); left: 0%; }

.sect { position: fixed; inset: 0; z-index: 20; pointer-events: none; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; will-change: opacity, transform; }
.sect h2 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(3rem, 12vw, 15rem); line-height: 0.85; letter-spacing: 0.02em; text-transform: uppercase; text-align: center; margin: 0; padding: 0 10px; }
.sect h2.ou { color: transparent; -webkit-text-stroke: 1px rgba(255,255,255,0.7); }
.sect h2.fi { color: #fff; }
.sect h2.rd { color: var(--red); text-shadow: 0 0 40px rgba(255,0,60,0.4); }
.sect .ey { font-size: 10px; letter-spacing: 0.4em; color: rgba(255,255,255,0.4); margin-bottom: 20px; text-transform: uppercase; }
.sect .rl { width: 40px; height: 2px; background: var(--red); margin-top: 20px; opacity: 0.8; }
</style>
</head>
<body>

<div id="boot">
  <div class="bmark" id="btext">SYSTEM</div>
  <div class="bline"><div class="bprog" id="bp"></div></div>
  <div class="bsub">Quantum Engine — Online</div>
</div>

<div id="cv"></div>
<div class="vig"></div><div class="scan"></div>

<div class="hud">
  <div class="htop">
    <div class="brand" id="brand">LOWKEY<span>.</span></div>
    <div class="snum" id="snum">PHASE_01 / 04<br><span style="font-size: 8px; opacity: 0.5;">INERTIAL DAMPENING: ACTIVE</span></div>
  </div>
  <div class="hbot" id="hbot">
    <span class="vv" id="vel">MASS: 0.00</span>
    <div class="pbar"><div class="pfill" id="pf"></div><div class="phead" id="ph"></div></div>
  </div>
</div>

<div class="sect" id="s0"><div class="ey">001 — Origin</div><h2 class="fi">SPATIAL</h2><h2 class="ou">ENGINEERING</h2><div class="rl"></div></div>
<div class="sect" id="s1"><div class="ey">002 — Sync</div><h2 class="ou">QUANTUM</h2><h2 class="fi">ENTANGLED</h2><div class="rl"></div></div>
<div class="sect" id="s2"><div class="ey">003 — Philosophy</div><h2 class="fi">CREATIVE</h2><h2 class="rd">DESTRUCTION</h2><div class="rl"></div></div>
<div class="sect" id="s3"><div class="ey">004 — Apex</div><h2 class="ou">THE</h2><h2 class="rd">SINGULARITY</h2><div class="rl"></div></div>

<script>
const bText = document.getElementById('btext');
const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
let iterations = 0;
const scramble = setInterval(() => {
    bText.innerText = bText.innerText.split("").map((l, i) => {
        if(i < iterations) return "LOWKEY"[i];
        return chars[Math.floor(Math.random() * chars.length)];
    }).join("");
    if(iterations >= 6) clearInterval(scramble);
    iterations += 1/4;
}, 30);

const bootEl=document.getElementById('boot'), bp=document.getElementById('bp');
setTimeout(() => bp.style.width = '100%', 300);
setTimeout(() => { 
    bootEl.classList.add('gone'); 
    setTimeout(()=>bootEl.remove(), 1500); 
    ['brand','snum','hbot'].forEach(id => document.getElementById(id).classList.add('on'));
}, 2200);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x030303, 0.012);

const camera = new THREE.PerspectiveCamera(65, innerWidth/innerHeight, 0.1, 1500);
camera.up.set(0, 1, 0);

const mainR = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance', alpha: false });
mainR.setSize(innerWidth, innerHeight);
const pixelRatio = window.innerWidth < 768 ? Math.min(window.devicePixelRatio, 1.5) : Math.min(window.devicePixelRatio, 2);
mainR.setPixelRatio(pixelRatio);
document.getElementById('cv').replaceWith(mainR.domElement);
mainR.domElement.id = 'cv';

const SN=`vec4 _p(vec4 x){return mod(((x*34.)+1.)*x,289.);}vec4 _ti(vec4 r){return 1.79284291400159-.85373472095314*r;}float snoise(vec3 v){const vec2 C=vec2(1./6.,1./3.);const vec4 D=vec4(0.,.5,1.,2.);vec3 i=floor(v+dot(v,C.yyy));vec3 x0=v-i+dot(i,C.xxx);vec3 g=step(x0.yzx,x0.xyz);vec3 l=1.-g;vec3 i1=min(g.xyz,l.zxy);vec3 i2=max(g.xyz,l.zxy);vec3 x1=x0-i1+C.xxx;vec3 x2=x0-i2+C.xxx*2.;vec3 x3=x0-1.+C.xxx*3.;i=mod(i,289.);vec4 p=_p(_p(_p(i.z+vec4(0.,i1.z,i2.z,1.))+i.y+vec4(0.,i1.y,i2.y,1.))+i.x+vec4(0.,i1.x,i2.x,1.));float n_=1./7.;vec3 ns=n_*D.wyz-D.xzx;vec4 j=p-49.*floor(p*ns.z*ns.z);vec4 x_=floor(j*ns.z);vec4 y_=floor(j-7.*x_);vec4 x=x_*ns.x+ns.yyyy;vec4 y=y_*ns.x+ns.yyyy;vec4 h=1.-abs(x)-abs(y);vec4 b0=vec4(x.xy,y.xy);vec4 b1=vec4(x.zw,y.zw);vec4 s0=floor(b0)*2.+1.;vec4 s1=floor(b1)*2.+1.;vec4 sh=-step(h,vec4(0.));vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;vec3 p0=vec3(a0.xy,h.x);vec3 p1=vec3(a0.zw,h.y);vec3 p2=vec3(a1.xy,h.z);vec3 p3=vec3(a1.zw,h.w);vec4 norm=_ti(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;return 42.*dot(vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)),vec4(1.));}`;

const coreGeo = new THREE.IcosahedronGeometry(13, 64);
const coreMat = new THREE.ShaderMaterial({
  uniforms: { uT: { value: 0 }, uV: { value: 0 } },
  vertexShader: `
    uniform float uT, uV; varying vec3 vN, vVP; varying float vD; ${SN}
    void main() {
      vN = normalMatrix * normal; vec3 p = position; 
      float t = uT * 0.15; // Slowed down idle breathing
      float n = snoise(p*0.3 + t) + snoise(p*0.8 - t*1.2)*0.5;
      float amp = 0.3 + uV * 4.0; // Scaled down visual explosion for elegance
      p += normal * n * amp; vD = n * amp;
      vec4 mv = modelViewMatrix * vec4(p, 1.0);
      vVP = -mv.xyz; gl_Position = projectionMatrix * mv;
    }`,
  fragmentShader: `
    uniform float uV; varying vec3 vN, vVP; varying float vD;
    void main() {
      vec3 N = normalize(vN); vec3 V = normalize(vVP);
      float fr = pow(clamp(1.0 - abs(dot(N, V)), 0.0, 1.0), 2.5);
      vec3 col = vec3(0.01); 
      float vein = smoothstep(-0.4, 0.4, vD * 0.3);
      vec3 vc = mix(vec3(0.2, 0.0, 0.0), vec3(1.0, 0.0, 0.1), vein);
      col = mix(col, vc, fr * (0.5 + uV * 1.5));
      vec3 chrome = mix(vec3(0.2), vec3(0.9), uV * 0.5);
      vec3 aberration = vec3(1.0, 0.0, 0.2) * uV * fr; 
      col = mix(col, chrome, pow(fr, 5.0) * (0.5 + uV));
      col += aberration * 0.5;
      gl_FragColor = vec4(clamp(col, 0.0, 1.0), 1.0);
    }`
});
const core = new THREE.Mesh(coreGeo, coreMat);
scene.add(core);

const glowMat = new THREE.MeshBasicMaterial({ color: 0xff003c, transparent: true, opacity: 0.15, blending: THREE.AdditiveBlending, depthWrite: false });
const glowMesh = new THREE.Mesh(new THREE.PlaneGeometry(60, 60), glowMat);
scene.add(glowMesh);

const PC = window.innerWidth < 768 ? 2000 : 5000;
const pp = new Float32Array(PC * 3), ps = new Float32Array(PC);
for(let i=0; i<PC; i++){
  const r = 40 + Math.random() * 60;
  const th = Math.random() * Math.PI * 2, ph = Math.acos(Math.random() * 2 - 1);
  pp[i*3] = r * Math.sin(ph) * Math.cos(th); pp[i*3+1] = r * Math.sin(ph) * Math.sin(th); pp[i*3+2] = r * Math.cos(ph);
  ps[i] = 0.4 + Math.random() * 1.5;
}
const pGeo = new THREE.BufferGeometry(); pGeo.setAttribute('position', new THREE.BufferAttribute(pp, 3)); pGeo.setAttribute('aSize', new THREE.BufferAttribute(ps, 1));

const pMat = new THREE.ShaderMaterial({
  uniforms: { uV: { value: 0 } },
  vertexShader: `
    attribute float aSize; uniform float uV; varying float vA;
    void main() {
      vec3 p = position; vec4 mv = modelViewMatrix * vec4(p, 1.0);
      mv.z += uV * 20.0 * aSize; float d = length(mv.xyz);
      vA = smoothstep(120.0, 30.0, d) * 0.6; gl_PointSize = aSize * (200.0 / d); gl_Position = projectionMatrix * mv;
    }`,
  fragmentShader: `varying float vA; void main() { float d = length(gl_PointCoord - 0.5) * 2.0; if(d > 1.0) discard; gl_FragColor = vec4(1.0, 1.0, 1.0, smoothstep(1.0, 0.0, d) * vA); }`,
  transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
});
scene.add(new THREE.Points(pGeo, pMat));

// ── QUANTUM ENTANGLEMENT ────────────────────────────────
const bc = new BroadcastChannel('lowkey_quantum');
let remoteX = window.screenX, remoteY = window.screenY;
let isLinked = false;
let lastPing = 0;
let remoteTargetProgress = null; 
const snum = document.getElementById('snum');

const tetherGeo = new THREE.CylinderGeometry(0.3, 0.3, 800, 8);
const tetherMat = new THREE.MeshBasicMaterial({ color: 0xff003c, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending, depthWrite: false });
const tether = new THREE.Mesh(tetherGeo, tetherMat);
tether.rotation.x = Math.PI / 2;
tether.visible = false;
scene.add(tether);

bc.onmessage = (e) => {
    isLinked = true;
    lastPing = Date.now();
    remoteX = e.data.x; 
    remoteY = e.data.y;
    
    snum.innerHTML = "QUANTUM LINK [ACTIVE]<br><span style='font-size: 8px; opacity: 0.5;'>NEURAL TETHER: SECURE</span>";
    snum.style.color = "#FF003C";

    if(e.data.type === 'sync') {
        // Sync targets instead of direct velocity for smooth dual-window scrolling
        remoteTargetProgress = e.data.tProg;
    }
};

setInterval(() => {
    let myX = window.screenX + innerWidth/2;
    let myY = window.screenY + innerHeight/2;
    bc.postMessage({ type: 'sync', x: myX, y: myY, tProg: targetProgress });
    
    if(Date.now() - lastPing > 1000 && isLinked) {
        isLinked = false;
        tether.visible = false;
        snum.innerHTML = `PHASE_0${active + 1} / 04<br><span style="font-size: 8px; opacity: 0.5;">INERTIAL DAMPENING: ACTIVE</span>`;
        snum.style.color = "rgba(255,255,255,0.4)";
    }
}, 50);

const camPath = new THREE.CatmullRomCurve3([
  new THREE.Vector3(  0,  60,  80), new THREE.Vector3(-55,  30,  60), new THREE.Vector3(-85,   5,   5),
  new THREE.Vector3(-60, -35, -55), new THREE.Vector3(  0, -60, -85), new THREE.Vector3( 60, -20, -55),
  new THREE.Vector3( 85,  10,   5), new THREE.Vector3( 55,  45,  60), new THREE.Vector3(  0,  20,  25),
  new THREE.Vector3(-20,  -5, -18), new THREE.Vector3( 30,  25,  25), 
], true, 'catmullrom', 0.5);

// ── HEAVY PHYSICS ENGINE ────────────────────────────────
let currentProgress = 0;
let targetProgress = 0;
let velocity = 0;

function injectForce(d) { 
    // Drastically scale down input force to prevent hyper-speed. 
    // Scroll down (positive delta) = move forward (positive target)
    let force = Math.max(-40, Math.min(40, d)); 
    targetProgress += force * 0.0003; 
}

window.addEventListener('wheel', e => injectForce(e.deltaY), {passive: true});
let dy0 = 0;
window.addEventListener('touchstart', e => { dy0 = e.touches[0].clientY; }, {passive: true});
window.addEventListener('touchmove', e => { injectForce(dy0 - e.touches[0].clientY); dy0 = e.touches[0].clientY; }, {passive: true});

const sects = [
  { el: document.getElementById('s0'), at: 0.02 }, { el: document.getElementById('s1'), at: 0.25 },
  { el: document.getElementById('s2'), at: 0.50 }, { el: document.getElementById('s3'), at: 0.82 }
];
let active = 0;
const pf = document.getElementById('pf'), ph = document.getElementById('ph'), vv = document.getElementById('vel');

// ── RENDER LOOP ─────────────────────────────────────────
const clock = new THREE.Clock();
const qCurrent = new THREE.Quaternion(); 

function animate() {
  const dt = clock.getDelta(), el = clock.elapsedTime;

  // Quantum sync: Gently blend remote target with local target
  if (remoteTargetProgress !== null) {
      targetProgress += (remoteTargetProgress - targetProgress) * 0.05;
  }

  // MASSIVE INERTIAL DAMPENING
  // Instead of snapping to the target, the camera chases it slowly.
  let previousProgress = currentProgress;
  currentProgress += (targetProgress - currentProgress) * 0.02; // Very heavy Lerp (0.02)
  
  // Visual velocity is based on the gap between current and target, creating a natural acceleration/deceleration curve
  let rawVel = Math.abs(targetProgress - currentProgress) * 50;
  velocity += (rawVel - velocity) * 0.1; 

  const t = ((currentProgress % 1) + 1) % 1; // Ensure t wraps safely

  const pos = camPath.getPointAt(t);
  const tan = camPath.getTangentAt(t);
  const upBase = new THREE.Vector3(0,1,0);
  const right = new THREE.Vector3().crossVectors(tan, upBase).normalize();
  const upTarget = new THREE.Vector3().crossVectors(right, tan).normalize();
  const m = new THREE.Matrix4().lookAt(pos, pos.clone().add(tan), upTarget);
  const qTarget = new THREE.Quaternion().setFromRotationMatrix(m);
  qCurrent.slerp(qTarget, 0.03); // Slower, heavier camera banking
  
  camera.position.copy(pos);
  camera.quaternion.copy(qCurrent);
  camera.lookAt(0,0,0);

  // Quantum Tether Logic
  if (isLinked) {
      tether.visible = true;
      let myX = window.screenX + innerWidth/2;
      let myY = window.screenY + innerHeight/2;
      let diffX = (remoteX - myX) * 0.1;
      let diffY = (myY - remoteY) * 0.1; 
      tether.position.copy(camera.position);
      let targetPos = new THREE.Vector3(camera.position.x + diffX, camera.position.y + diffY, camera.position.z - 100);
      tether.lookAt(targetPos);
      let fwd = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
      tether.position.add(fwd.multiplyScalar(5));
      tether.scale.set(1 + velocity, 1 + velocity, 1);
  }

  const fovT = 65 + velocity * 10; // Less aggressive FOV stretch
  camera.fov += (fovT - camera.fov) * 0.1;
  camera.updateProjectionMatrix();

  coreMat.uniforms.uT.value = el;
  coreMat.uniforms.uV.value = Math.min(velocity, 3);
  pMat.uniforms.uV.value = velocity;
  
  glowMesh.scale.setScalar(1 + Math.min(velocity, 2) * 0.2);
  glowMesh.lookAt(camera.position);
  core.rotation.y += dt * 0.05; core.rotation.z += dt * 0.02;

  let ni = 0, nd = 9;
  sects.forEach((s, i) => {
    const d = Math.min(Math.abs(t - s.at), 1 - Math.abs(t - s.at));
    // Widened the visibility window from 0.08 to 0.15 so text stays on screen longer
    const W = 0.15; 
    const op = Math.max(0, 1 - d/W);
    // Scale comes from deeper back (0.6) and stops at 1.0 for more dramatic depth
    const scale = 0.6 + op * 0.4; 
    
    s.el.style.opacity = op;
    s.el.style.transform = `scale(${scale}) translate3d(0,0,0)`;
    if(d < nd) { nd = d; ni = i; }
  });
  
  if(ni !== active && !isLinked) { active = ni; snum.innerHTML = `PHASE_0${active + 1} / 04<br><span style="font-size: 8px; opacity: 0.5;">INERTIAL DAMPENING: ACTIVE</span>`; }

  vv.textContent = `MASS: ${(velocity*10).toFixed(2)}`;
  const pct = t * 100;
  pf.style.width = pct + '%'; ph.style.left = pct + '%';

  mainR.render(scene, camera);
  requestAnimationFrame(animate);
}

animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix();
  mainR.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
