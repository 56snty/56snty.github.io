<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>IGLOO // EMAL.DEV</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.27/bundled/lenis.min.js"></script>
    <style>
        :root { --bg: #0a0a0b; --text: #e4e4e7; }
        * { margin:0; padding:0; box-sizing:border-box; cursor: none; }
        body { background: var(--bg); color: var(--text); font-family: "Inter", sans-serif; overflow-x:hidden; height: 500vh; }
        
        /* The Igloo.inc Grain Overlay */
        .noise {
            position: fixed; inset: 0; z-index: 999; pointer-events: none;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.05; contrast: 150%;
        }

        #canvas-container { position:fixed; inset:0; z-index:0; }
        
        .ui { position:fixed; inset:0; padding:50px; z-index:100; pointer-events:none; }
        .nav { display:flex; justify-content:space-between; font-size:10px; letter-spacing:0.3em; text-transform:uppercase; font-weight:700; opacity:0.5; }
        
        .hero { position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); text-align:center; width:100%; }
        h1 { font-size:15vw; font-weight:900; letter-spacing:-0.06em; line-height:0.8; margin:0; pointer-events:auto; }
        
        #custom-cursor { 
            position: fixed; width: 12px; height: 12px; background: #fff; border-radius: 50%; 
            pointer-events: none; z-index: 1000; mix-blend-mode: difference; transition: transform 0.1s ease-out; 
        }
    </style>
</head>
<body>
    <div class="noise"></div>
    <div id="custom-cursor"></div>
    <div id="canvas-container"></div>
    
    <div class="ui">
        <div class="nav">
            <div>EMAL.STUDIO</div>
            <div>STATUS: ONLINE</div>
        </div>
        <div class="hero">
            <h1 id="title">ICE_CORE</h1>
        </div>
    </div>

<script>
// --- THREE.JS IGLOO SETUP ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.getElementById('canvas-container').appendChild(renderer.domElement);

// Physical Glass Material (Igloo style)
const material = new THREE.MeshPhysicalMaterial({
    color: 0xffffff,
    metalness: 0,
    roughness: 0.1,
    transmission: 1.0, // Glassy look
    thickness: 2.0,
    ior: 1.5,
    iridescence: 1.0,
    iridescenceIOR: 1.3,
    sheen: 1.0,
    sheenColor: 0x00ffff
});

// Use Octahedron for that "Ice Block" procedural look
const geometry = new THREE.OctahedronGeometry(2, 40); 
const ice = new THREE.Mesh(geometry, material);
scene.add(ice);

const light = new THREE.DirectionalLight(0xffffff, 2);
light.position.set(5, 5, 5);
scene.add(light);
scene.add(new THREE.AmbientLight(0xffffff, 0.5));

camera.position.z = 5;

// --- INTERACTIONS ---
const cursor = document.getElementById('custom-cursor');
window.addEventListener('mousemove', (e) => {
    cursor.style.transform = `translate(${e.clientX - 6}px, ${e.clientY - 6}px)`;
    // Tilt effect
    ice.rotation.x = (e.clientY / window.innerHeight) - 0.5;
    ice.rotation.y = (e.clientX / window.innerWidth) - 0.5;
});

const lenis = new Lenis({ lerp: 0.05 });
let scrollProgress = 0;
lenis.on('scroll', (e) => {
    scrollProgress = e.progress;
    // Glitchy Scale
    ice.scale.setScalar(1 + Math.sin(scrollProgress * 10) * 0.1 + scrollProgress);
});

function animate(t) {
    lenis.raf(t);
    
    // Wave Deformation
    const pos = ice.geometry.attributes.position;
    for(let i=0; i<pos.count; i++) {
        let x = pos.getX(i);
        let y = pos.getY(i);
        let z = pos.getZ(i);
        let wave = Math.sin(x * 1.5 + t * 0.002) * 0.1;
        pos.setZ(i, 2 + wave);
    }
    pos.needsUpdate = true;
    
    ice.rotation.z += 0.002;
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
