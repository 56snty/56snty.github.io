<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
    <title>EMAL // ZENITH_11</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.27/bundled/lenis.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@100;900&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; cursor: none; }
        body { background: #000; color: #fff; font-family: 'Outfit', sans-serif; overflow: hidden; height: 1500vh; }
        
        #canvas-container { position:fixed; inset:0; z-index:0; }
        
        /* The Masterpiece Polish */
        .noise { position:fixed; inset:0; z-index:999; opacity:0.12; pointer-events:none; background:url('https://grainy-gradients.vercel.app/noise.svg'); mix-blend-mode: overlay; }
        .vignette { position:fixed; inset:0; z-index:5; background: radial-gradient(circle, transparent 30%, black 120%); pointer-events:none; }
        
        .hud { position:fixed; inset:0; padding:60px; z-index:100; pointer-events:none; mix-blend-mode: difference; }
        .nav { display:flex; justify-content:space-between; font-size:10px; letter-spacing:0.8em; font-weight:100; text-transform: uppercase; }
        
        .content { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
        .card { 
            opacity: 0; transform: scale(0.3) rotateY(45deg); filter: blur(40px);
            transition: all 1.8s cubic-bezier(0.16, 1, 0.3, 1);
            text-align: center; 
        }
        .card.active { opacity: 1; transform: scale(1) rotateY(0deg); filter: blur(0px); }
        
        h2 { font-size: 20vw; font-weight: 900; letter-spacing: -0.08em; line-height: 0.75; margin:0; }
        p { font-size: 10px; letter-spacing: 15px; opacity: 0.4; margin-top: 40px; }

        #cursor { position: fixed; width: 60px; height: 60px; border: 0.5px solid rgba(255,255,255,0.2); border-radius: 50%; pointer-events: none; z-index: 1000; transition: transform 0.2s cubic-bezier(0, 0.5, 0.5, 1); }
        #shutter { position:fixed; inset:0; background:#000; z-index:10000; transition: opacity 2.5s cubic-bezier(0.7,0,0.3,1); }
    </style>
</head>
<body>
    <div id="shutter"></div>
    <div id="cursor"></div>
    <div class="noise"></div>
    <div class="vignette"></div>
    <div id="canvas-container"></div>

    <div class="hud">
        <div class="nav">
            <div>EMAL / PERSISTENCE</div>
            <div id="velocity">VEL: 0.00</div>
        </div>
    </div>

    <div class="content"><div class="card" id="c1"><h2>AETHER</h2><p>01 // SYSTEM_LOAD</p></div></div>
    <div class="content"><div class="card" id="c2"><h2>VOID</h2><p>02 // DEEP_LOGIC</p></div></div>
    <div class="content"><div class="card" id="c3"><h2>ZENITH</h2><p>03 // TERMINUS</p></div></div>

<script>
window.scrollTo(0,0);
if (history.scrollRestoration) history.scrollRestoration = "manual";

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.01, 1000);
const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.getElementById('canvas-container').appendChild(renderer.domElement);

// --- THE FRACTAL GLASS PATH ---
const points = [];
for (let i = 0; i <= 50; i++) {
    points.push(new THREE.Vector3(Math.sin(i * 0.3) * 5, Math.cos(i * 0.4) * 5, i * 25));
}
const curve = new THREE.CatmullRomCurve3(points, true);
const tubeGeo = new THREE.TubeGeometry(curve, 512, 4, 32, true);

const material = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 }, uScroll: { value: 0 }, uVelocity: { value: 0 } },
    side: THREE.BackSide,
    transparent: true,
    vertexShader: `
        varying vec2 vUv;
        uniform float uTime;
        uniform float uVelocity;
        void main() {
            vUv = uv;
            vec3 p = position;
            // Distort tunnel based on movement velocity
            p.x += sin(p.z * 0.1 + uTime) * (1.0 + uVelocity * 10.0);
            gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);
        }
    `,
    fragmentShader: `
        varying vec2 vUv;
        uniform float uTime;
        uniform float uVelocity;
        void main() {
            float grid = smoothstep(0.98, 1.0, sin(vUv.x * 100.0 + uTime));
            vec3 color = mix(vec3(0.02), vec3(0.8, 0.8, 1.0), grid);
            // Chromatic shift simulation
            color.r += uVelocity * 2.0;
            gl_FragColor = vec4(color, 0.6);
        }
    `
});

const tunnel = new THREE.Mesh(tubeGeo, material);
scene.add(tunnel);

// Star Streak Particles
const starCount = 15000;
const starGeo = new THREE.BufferGeometry();
const positions = new Float32Array(starCount * 3);
for(let i=0; i<starCount*3; i++) positions[i] = (Math.random()-0.5) * 250;
starGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.01, transparent: true, opacity: 0.7 }));
scene.add(stars);

// --- MOTION ENGINE ---
const lenis = new Lenis({ lerp: 0.03, smoothWheel: true, infinite: true });
let scrollProgress = 0;
let lastProgress = 0;

function animate(t) {
    lenis.raf(t);
    const loop = (scrollProgress % 1 + 1) % 1;
    
    // Smooth camera flow
    camera.position.copy(curve.getPointAt(loop));
    camera.lookAt(curve.getPointAt((loop + 0.015) % 1));
    camera.rotation.z += Math.sin(t * 0.0004) * 0.3; // Constant Barrel Roll

    // Velocity Math
    const velocity = Math.abs(scrollProgress - lastProgress);
    lastProgress = scrollProgress;
    
    material.uniforms.uTime.value = t * 0.001;
    material.uniforms.uVelocity.value = velocity;
    document.getElementById('velocity').textContent = `VEL: ${velocity.toFixed(4)}`;

    check(loop, 0.15, 'c1');
    check(loop, 0.45, 'c2');
    check(loop, 0.80, 'c3');

    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}

function check(p, target, id) {
    const el = document.getElementById(id);
    const active = p > target && p < target + 0.12;
    el.classList.toggle('active', active);
}

lenis.on('scroll', (e) => { scrollProgress = e.animatedScroll / 20000; });

window.addEventListener('mousemove', (e) => {
    document.getElementById('cursor').style.transform = `translate(${e.clientX - 30}px, ${e.clientY - 30}px)`;
});

setTimeout(() => { 
    document.getElementById('shutter').style.opacity = 0;
    setTimeout(() => document.getElementById('shutter').remove(), 2500);
}, 1000);

requestAnimationFrame(animate);
</script>
</body>
</html>
