<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>EMAL // V.ULTIMATE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.27/bundled/lenis.min.js"></script>
    <style>
        :root { --bg: #050505; --accent: #fff; }
        * { margin:0; padding:0; box-sizing:border-box; cursor: none; }
        body { background: var(--bg); color: var(--accent); font-family: "Helvetica Neue", Arial, sans-serif; overflow-x:hidden; height: 600vh; }
        
        /* Grainy Texture Overlay */
        body::after {
            content: ""; position: fixed; inset: 0; 
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.04; pointer-events: none; z-index: 999;
        }

        #canvas-container { position:fixed; inset:0; z-index:0; }
        
        .ui { position:fixed; inset:0; padding:40px; pointer-events:none; z-index:100; mix-blend-mode: difference; }
        .nav { display:flex; justify-content:space-between; font-size:11px; font-weight:600; letter-spacing:0.2em; text-transform:uppercase; }
        
        .center-text { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100%; text-align: center; pointer-events: none;
        }
        h1 { font-size: 22vw; font-weight: 900; letter-spacing: -0.05em; line-height: 0.7; opacity: 0.9; }
        
        .footer { position: fixed; bottom: 40px; left: 40px; right: 40px; display: flex; justify-content: space-between; align-items: flex-end; }
        .status { font-size: 10px; line-height: 1.6; }
        .circle { width: 8px; height: 8px; background: #00ffcc; border-radius: 50%; display: inline-block; margin-right: 10px; box-shadow: 0 0 10px #00ffcc; }
        
        .section { height: 100vh; }
        #custom-cursor { position: fixed; width: 20px; height: 20px; border: 1px solid #fff; border-radius: 50%; pointer-events: none; z-index: 1000; transition: transform 0.1s; }
    </style>
</head>
<body>
    <div id="custom-cursor"></div>
    <div id="canvas-container"></div>
    
    <div class="ui">
        <nav class="nav">
            <div>EMAL.DEV</div>
            <div id="sync-status">NODE_STANDALONE</div>
            <div>[ 2026 ]</div>
        </nav>
        
        <div class="center-text">
            <h1 id="main-title">CORE</h1>
        </div>

        <div class="footer">
            <div class="status">
                <span class="circle" id="pulse"></span> LIVE_SYNC_ACTIVE<br>
                <span style="opacity:0.5">LATENCY: </span><span id="latency">0ms</span>
            </div>
            <div class="status" style="text-align: right;">
                MORPH_STATE: <span id="m-state">0.00</span><br>
                <span style="opacity:0.5">IGLOO_ENGINE_V6</span>
            </div>
        </div>
    </div>

    <section class="section"></section>
    <section class="section"></section>
    <section class="section"></section>
    <section class="section"></section>

<script>
// --- CORE ENGINE ---
const bc = new BroadcastChannel('EMAL_ULTIMATE_SYNC');
const cursor = document.getElementById('custom-cursor');
const titles = ['CORE', 'FLUID', 'SYNC', 'VOID'];
let scrollTarget = 0;
let currentScroll = 0;

// Cursor Movement
window.addEventListener('mousemove', (e) => {
    cursor.style.transform = `translate(${e.clientX - 10}px, ${e.clientY - 10}px)`;
});

// --- SYNC ENGINE (BIDIRECTIONAL) ---
bc.onmessage = (e) => { document.getElementById("pulse").style.boxShadow = "0 0 30px #00ffcc"; setTimeout(() => { document.getElementById("pulse").style.boxShadow = "0 0 10px #00ffcc"; }, 100);
    scrollTarget = e.data.progress;
    document.getElementById('sync-status').textContent = "NODE_LINKED_" + e.data.node;
    document.getElementById('latency').textContent = Math.floor(Math.random() * 5) + "ms";
};

// --- THREE.JS VISUALS ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.getElementById('canvas-container').appendChild(renderer.domElement);

// Advanced Glassy Material
const material = new THREE.MeshPhysicalMaterial({
    color: 0xffffff,
    metalness: 0.1,
    roughness: 0.05,
    transmission: 0.9, emissive: 0x0055ff, emissiveIntensity: 0.2,
    thickness: 1.5,
    transparent: true,
    wireframe: false
});

const geometry = new THREE.SphereGeometry(2, 128, 128);
const blob = new THREE.Mesh(geometry, material);
scene.add(blob);

const light1 = new THREE.PointLight(0xff0055, 2); light1.position.set(5, 5, 5); scene.add(light1);
const light2 = new THREE.PointLight(0x0055ff, 2); light2.position.set(-5, -5, 5); scene.add(light2);
scene.add(new THREE.AmbientLight(0xffffff, 0.5));

camera.position.z = 5;

// --- SMOOTH SCROLL ---
const lenis = new Lenis({ duration: 1.2, easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)) });
lenis.on('scroll', (e) => {
    scrollTarget = e.progress;
    bc.postMessage({ progress: e.progress, node: Math.floor(Math.random()*999) });
});

function animate(time) {
    lenis.raf(time);
    
    // Smooth Lerping
    currentScroll += (scrollTarget - currentScroll) * 0.05;
    
    // Blob Deformation Logic
    const positions = blob.geometry.attributes.position;
    for (let i = 0; i < positions.count; i++) {
        const x = positions.getX(i);
        const y = positions.getY(i);
        const z = positions.getZ(i);
        
        const noise = Math.sin(x * 1.5 + time * 0.001) * Math.cos(y * 1.5 + time * 0.001) * (0.5 + currentScroll * 2.0);
                      
        const wave = Math.sin(time * 0.002 + x) * 0.1;
        
        positions.setZ(i, 2 + noise + wave);
    }
    positions.needsUpdate = true;
    
    // UI Updates
    const titleIndex = Math.floor(currentScroll * (titles.length - 0.1));
    document.getElementById('main-title').textContent = titles[titleIndex];
    document.getElementById('m-state').textContent = currentScroll.toFixed(2);
    
    blob.rotation.y += 0.005;
    blob.rotation.z += 0.002;
    
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
