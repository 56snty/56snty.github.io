<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
    <title>EMAL // IGLOO_ZENITH</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.27/bundled/lenis.min.js"></script>
    <style>
        :root { --accent: #fff; --bg: #030303; }
        * { margin:0; padding:0; box-sizing:border-box; cursor: none; }
        body { background: var(--bg); color: #fff; font-family: "Inter", sans-serif; overflow-x:hidden; height: 1000vh; }
        
        #canvas-container { position:fixed; inset:0; z-index:0; }
        
        /* Igloo.inc Grain Overlay */
        .noise { position:fixed; inset:0; z-index:999; opacity:0.06; pointer-events:none; background:url('https://grainy-gradients.vercel.app/noise.svg'); }
        
        /* Frosted Glass HUD */
        .hud { position:fixed; inset:0; padding:40px; z-index:100; pointer-events:none; display:flex; flex-direction:column; justify-content:space-between; }
        .nav-top { display:flex; justify-content:space-between; font-size:10px; letter-spacing:4px; font-weight:900; mix-blend-mode: difference; }
        
        .content-layer { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 10; }
        .card { 
            opacity: 0; transform: scale(0.8) blur(10px); transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
            text-align: center; 
        }
        .card.active { opacity: 1; transform: scale(1) blur(0px); }
        h2 { font-size: 12vw; font-weight: 900; letter-spacing: -0.06em; line-height: 0.8; margin-bottom: 10px; }
        p { font-size: 10px; letter-spacing: 5px; opacity: 0.4; text-transform: uppercase; }

        #cursor { position: fixed; width: 8px; height: 8px; background: #fff; border-radius: 50%; pointer-events: none; z-index: 1000; mix-blend-mode: difference; }
    </style>
</head>
<body>
    <div id="cursor"></div>
    <div class="noise"></div>
    <div id="canvas-container"></div>

    <div class="hud">
        <div class="nav-top">
            <div>EMAL.LABS</div>
            <div>STATUS: SEAMLESS_FLIGHT</div>
            <div>[ 2026 ]</div>
        </div>
    </div>

    <div class="content-layer"><div class="card" id="c1"><p>01 // ARCHITECT</p><h2>EMAL</h2></div></div>
    <div class="content-layer"><div class="card" id="c2"><p>02 // REALMS</p><h2>BEYOND</h2></div></div>
    <div class="content-layer"><div class="card" id="c3"><p>03 // CONNECT</p><h2>VOID</h2></div></div>

<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.getElementById('canvas-container').appendChild(renderer.domElement);

// --- INFINITE LOOP ENGINE ---
const points = [];
for (let i = 0; i <= 20; i++) {
    points.push(new THREE.Vector3(Math.sin(i * 0.5) * 4, Math.cos(i * 0.8) * 4, i * 15));
}
// Closed: true makes it a seamless loop
const curve = new THREE.CatmullRomCurve3(points, true);
const tubeGeo = new THREE.TubeGeometry(curve, 256, 3, 12, true);

// Igloo-Style "Ice Wireframe"
const material = new THREE.MeshStandardMaterial({ 
    color: 0x444444, 
    wireframe: true, 
    transparent: true, 
    opacity: 0.15,
    emissive: 0xffffff,
    emissiveIntensity: 0.05
});
const tunnel = new THREE.Mesh(tubeGeo, material);
scene.add(tunnel);

// Star Particles
const starGeo = new THREE.BufferGeometry();
const starPos = [];
for(let i=0; i<4000; i++) {
    starPos.push((Math.random()-0.5)*100, (Math.random()-0.5)*100, Math.random()*500);
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({color:0xffffff, size:0.03, transparent:true, opacity:0.5}));
scene.add(stars);

// --- SEAMLESS FLY-THROUGH ---
const bc = new BroadcastChannel('ZENITH_SYNC'); bc.onmessage = (e) => { lenis.scrollTo(e.data.prog * 5000, {immediate: false}); };
const lenis = new Lenis({ lerp: 0.04, smoothWheel: true });
let scrollProgress = 0;

function animate(t) {
    lenis.raf(t);
    
    // Smooth camera flight - % 1 ensures the loop never "ends" or crashes
    const loopPos = scrollProgress % 1;
    const camPos = curve.getPointAt(loopPos);
    const lookAtPos = curve.getPointAt((loopPos + 0.01) % 1);
    
    camera.position.copy(camPos);
    camera.lookAt(lookAtPos);
    
    // Tilt based on curve
    camera.rotation.z += Math.sin(t * 0.001) * 0.1;

    // Trigger Content (Seamlessly)
    check(loopPos, 0.1, 'c1');
    check(loopPos, 0.4, 'c2');
    check(loopPos, 0.8, 'c3');

    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}

function check(p, target, id) {
    const el = document.getElementById(id);
    if(p > target && p < target + 0.15) el.classList.add('active');
    else el.classList.remove('active');
}

lenis.on('scroll', (e) => { 
    // This allows the user to scroll infinitely
    scrollProgress = e.animatedScroll / 5000; bc.postMessage({prog: scrollProgress}); 
});

window.addEventListener('mousemove', (e) => {
    document.getElementById('cursor').style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
});

requestAnimationFrame(animate);
</script>
</body>
</html>
