<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>IGLOO // EMAL.DEV</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.27/bundled/lenis.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; cursor: none; }
        body { background: #050506; color: #fff; font-family: sans-serif; overflow-x:hidden; height: 400vh; }
        #canvas-container { position:fixed; inset:0; z-index:0; }
        .ui { position:fixed; inset:0; padding:40px; z-index:100; pointer-events:none; mix-blend-mode: difference; }
        .nav { display:flex; justify-content:space-between; font-size:10px; letter-spacing:0.3em; opacity:0.5; }
        h1 { position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); font-size:15vw; font-weight:900; letter-spacing:-0.05em; line-height:0.8; }
        .grain { position:fixed; inset:0; z-index:999; opacity:0.04; pointer-events:none; background:url('https://grainy-gradients.vercel.app/noise.svg'); }
    </style>
</head>
<body>
    <div class="grain"></div>
    <div id="canvas-container"></div>
    <div class="ui">
        <div class="nav"><div>EMAL.DEV</div><div>SHADER_v9_CORE</div></div>
        <h1>ICE_CORE</h1>
    </div>

<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.getElementById('canvas-container').appendChild(renderer.domElement);

// --- THE CUSTOM ICE SHADER ---
const iceMaterial = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 }, uScroll: { value: 0 } },
    transparent: true,
    vertexShader: `
        varying vec3 vNormal;
        varying vec3 vEye;
        uniform float uTime;
        uniform float uScroll;
        void main() {
            vNormal = normalize(normalMatrix * normal);
            vec4 worldPos = modelViewMatrix * vec4(position, 1.0);
            vEye = normalize(-worldPos.xyz);
            
            // Subtle Ice Deformation
            vec3 p = position;
            p.z += sin(p.x * 2.0 + uTime) * 0.1 * (1.0 + uScroll);
            gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);
        }
    `,
    fragmentShader: `
        varying vec3 vNormal;
        varying vec3 vEye;
        uniform float uTime;
        void main() {
            // Fake Refraction Logic
            float fresnel = pow(1.0 - dot(vNormal, vEye), 3.0);
            vec3 iceColor = mix(vec3(0.0, 0.2, 0.4), vec3(0.8, 0.9, 1.0), fresnel);
            
            // Add internal "Glitch" light
            float shimmer = sin(vNormal.x * 10.0 + uTime) * 0.1;
            gl_FragColor = vec4(iceColor + shimmer, 0.9);
        }
    `
});

const geometry = new THREE.IcosahedronGeometry(2, 40);
const mesh = new THREE.Mesh(geometry, iceMaterial);
scene.add(mesh);
camera.position.z = 5;

const lenis = new Lenis();
let scroll = 0;
lenis.on('scroll', (e) => { scroll = e.progress; });

function animate(t) {
    lenis.raf(t);
    iceMaterial.uniforms.uTime.value = t * 0.001;
    iceMaterial.uniforms.uScroll.value = scroll;
    
    mesh.rotation.y += 0.005 + (scroll * 0.02);
    mesh.rotation.x += 0.002;
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
