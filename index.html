<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | In The Making</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #060606;
            --fg: #f0ece3;
            --accent: #e8a020;
            --muted: #2a2a2a;
            --dim: #555;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: 'Space Mono', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* ── DIAGONAL STRIPE BACKGROUND ── */
        .stripe-bg {
            position: absolute;
            inset: 0;
            background-image: repeating-linear-gradient(
                -45deg,
                transparent,
                transparent 60px,
                rgba(232, 160, 32, 0.018) 60px,
                rgba(232, 160, 32, 0.018) 62px
            );
            z-index: 0;
        }

        /* ── GRAIN OVERLAY ── */
        .grain {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            opacity: 0.045;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 256px 256px;
        }

        /* ── SCANLINES ── */
        .scanlines {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 2;
            background: repeating-linear-gradient(
                to bottom,
                transparent 0px,
                transparent 3px,
                rgba(0,0,0,0.06) 3px,
                rgba(0,0,0,0.06) 4px
            );
        }

        /* ── CORNER MARKERS ── */
        .corner {
            position: absolute;
            width: 28px;
            height: 28px;
            z-index: 5;
        }
        .corner::before, .corner::after {
            content: '';
            position: absolute;
            background: var(--accent);
            opacity: 0.6;
        }
        .corner::before { width: 100%; height: 1px; top: 0; left: 0; }
        .corner::after  { width: 1px; height: 100%; top: 0; left: 0; }
        .corner.tl { top: 24px; left: 24px; }
        .corner.tr { top: 24px; right: 24px; transform: scaleX(-1); }
        .corner.bl { bottom: 24px; left: 24px; transform: scaleY(-1); }
        .corner.br { bottom: 24px; right: 24px; transform: scale(-1); }

        /* ── CUSTOM CURSOR ── */
        .cursor {
            width: 8px;
            height: 8px;
            background: var(--accent);
            position: fixed;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 9999;
            transition: width 0.18s, height 0.18s, border-radius 0.18s;
        }
        .cursor-ring {
            width: 32px;
            height: 32px;
            border: 1px solid rgba(232, 160, 32, 0.5);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 9998;
            transition: all 0.12s ease;
        }

        /* ── MAIN CONTAINER ── */
        .container {
            text-align: center;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            user-select: none;
        }

        /* ── STATUS BAR ABOVE 404 ── */
        .status-tag {
            font-size: 0.65rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            animation: fadeIn 0.8s ease both;
        }
        .status-tag::before, .status-tag::after {
            content: '';
            display: block;
            width: 30px;
            height: 1px;
            background: var(--accent);
            opacity: 0.5;
        }
        .dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--accent);
            display: inline-block;
            animation: blink 1.4s ease infinite;
        }

        /* ── GIANT 404 ── */
        .huge-404 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(11rem, 28vw, 24rem);
            line-height: 0.82;
            letter-spacing: 0.04em;
            color: transparent;
            -webkit-text-stroke: 1.5px rgba(240, 236, 227, 0.75);
            position: relative;
            transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            transform: translate(calc(var(--px, 0) * 18px), calc(var(--py, 0) * 12px));
            animation: slideDown 1s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        /* Glitch layers */
        .huge-404::before,
        .huge-404::after {
            content: '404';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            font-family: 'Bebas Neue', sans-serif;
            font-size: inherit;
            line-height: inherit;
            letter-spacing: inherit;
            color: transparent;
            opacity: 0;
        }
        .huge-404::before {
            -webkit-text-stroke: 1.5px var(--accent);
            animation: glitch-1 5s infinite;
            clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%);
        }
        .huge-404::after {
            -webkit-text-stroke: 1.5px #4af;
            animation: glitch-2 5s infinite;
            clip-path: polygon(0 60%, 100% 60%, 100% 75%, 0 75%);
        }

        /* ── DIVIDER ── */
        .divider {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 14px;
            margin: 2px 0 18px;
            animation: fadeIn 0.8s ease 0.3s both;
            opacity: 0;
        }
        .divider-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--muted));
        }
        .divider-line.right {
            background: linear-gradient(to left, transparent, var(--muted));
        }
        .divider-text {
            font-size: 0.6rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--dim);
        }

        /* ── TAGLINE ── */
        .tagline {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(1.8rem, 4.5vw, 3.5rem);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--fg);
            animation: fadeIn 0.8s ease 0.25s both;
            opacity: 0;
        }

        /* ── SUBTEXT ── */
        .subtext {
            font-size: 0.72rem;
            color: var(--dim);
            max-width: 380px;
            line-height: 1.8;
            letter-spacing: 0.04em;
            margin-top: 12px;
            animation: fadeIn 0.8s ease 0.4s both;
            opacity: 0;
        }

        /* ── RETURN BUTTON ── */
        .btn-wrap {
            margin-top: 28px;
            animation: fadeIn 0.8s ease 0.55s both;
            opacity: 0;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 24px;
            border: 1px solid var(--muted);
            color: var(--dim);
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            text-decoration: none;
            position: relative;
            transition: color 0.25s, border-color 0.25s;
            overflow: hidden;
        }
        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--accent);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            z-index: -1;
        }
        .btn:hover {
            color: #000;
            border-color: var(--accent);
        }
        .btn:hover::before { transform: scaleX(1); }
        .btn svg { transition: transform 0.25s; }
        .btn:hover svg { transform: translateX(4px); }

        /* ── BOTTOM STATUS BAR ── */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 44px;
            border-top: 1px solid var(--muted);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;
            z-index: 20;
            animation: fadeIn 0.8s ease 0.7s both;
            opacity: 0;
        }
        .bottom-bar::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(6, 6, 6, 0.85);
            backdrop-filter: blur(8px);
            z-index: -1;
        }
        .bar-left, .bar-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .bar-item {
            font-size: 0.58rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--dim);
        }
        .bar-item span { color: var(--accent); }
        .bar-sep { color: var(--muted); }

        /* ── LOADING BAR ── */
        .bar-progress {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .progress-track {
            width: 90px;
            height: 1px;
            background: var(--muted);
            position: relative;
            overflow: hidden;
        }
        .progress-fill {
            position: absolute;
            top: 0; left: 0;
            height: 100%;
            background: var(--accent);
            animation: sweep 2.8s cubic-bezier(0.77, 0, 0.18, 1) infinite;
        }

        /* ── ANIMATIONS ── */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px) translate(calc(var(--px,0)*18px), calc(var(--py,0)*12px)); }
            to   { opacity: 1; transform: translateY(0) translate(calc(var(--px,0)*18px), calc(var(--py,0)*12px)); }
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }
        @keyframes sweep {
            0%   { width: 0%;    left: 0%; }
            50%  { width: 100%;  left: 0%; }
            100% { width: 0%;    left: 100%; }
        }
        @keyframes glitch-1 {
            0%, 88%, 100% { opacity: 0; transform: none; }
            90%  { opacity: 0.7; transform: translate(-3px, 0); }
            93%  { opacity: 0.7; transform: translate(3px, 0); }
            96%  { opacity: 0.7; transform: translate(-2px, 0); }
            99%  { opacity: 0; }
        }
        @keyframes glitch-2 {
            0%, 88%, 100% { opacity: 0; transform: none; }
            91%  { opacity: 0.5; transform: translate(4px, 0); }
            94%  { opacity: 0.5; transform: translate(-3px, 0); }
            97%  { opacity: 0.5; transform: translate(2px, 0); }
            99%  { opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="stripe-bg"></div>
    <div class="grain"></div>
    <div class="scanlines"></div>

    <!-- Corner markers -->
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <!-- Custom cursor -->
    <div class="cursor"  id="cursor"></div>
    <div class="cursor-ring" id="cursor-ring"></div>

    <div class="container" id="container">
        <div class="status-tag">
            <div class="dot"></div>
            Error Code
        </div>

        <div class="huge-404" id="huge404">404</div>

        <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-text">Page not found</div>
            <div class="divider-line right"></div>
        </div>

        <div class="tagline">Work in Progress.</div>
        <div class="subtext">The page you're looking for doesn't exist yet.<br>Greatness takes time — check back soon.</div>

        <div class="btn-wrap">
            <a href="/" class="btn">
                Return home
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                    <path d="M1 6h10M7 2l4 4-4 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </a>
        </div>
    </div>

    <!-- Bottom status bar -->
    <div class="bottom-bar">
        <div class="bar-left">
            <div class="bar-item">Status <span>Building</span></div>
            <div class="bar-sep">·</div>
            <div class="bar-item">Phase <span>01</span></div>
        </div>
        <div class="bar-right">
            <div class="bar-progress">
                <div class="bar-item" id="pct-label">—</div>
                <div class="progress-track">
                    <div class="progress-fill"></div>
                </div>
            </div>
            <div class="bar-sep">·</div>
            <div class="bar-item" id="ts">—</div>
        </div>
    </div>

    <script>
        // ── CURSOR ──
        const cursor     = document.getElementById('cursor');
        const cursorRing = document.getElementById('cursor-ring');
        let mx = -100, my = -100, rx = -100, ry = -100;

        document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

        (function animateCursor() {
            rx += (mx - rx) * 0.14;
            ry += (my - ry) * 0.14;
            cursor.style.left     = mx + 'px';
            cursor.style.top      = my + 'px';
            cursorRing.style.left = rx + 'px';
            cursorRing.style.top  = ry + 'px';
            requestAnimationFrame(animateCursor);
        })();

        // Scale cursor ring on hover over 404
        const huge = document.getElementById('huge404');
        huge.addEventListener('mouseenter', () => {
            cursorRing.style.width  = '80px';
            cursorRing.style.height = '80px';
            cursorRing.style.borderColor = 'rgba(232,160,32,0.8)';
        });
        huge.addEventListener('mouseleave', () => {
            cursorRing.style.width  = '32px';
            cursorRing.style.height = '32px';
            cursorRing.style.borderColor = 'rgba(232,160,32,0.5)';
        });

        // ── PARALLAX ──
        document.addEventListener('mousemove', e => {
            const x = (e.clientX / window.innerWidth  - 0.5);
            const y = (e.clientY / window.innerHeight - 0.5);
            huge.style.setProperty('--px', x);
            huge.style.setProperty('--py', y);
        });

        // ── TIMESTAMP ──
        const ts = document.getElementById('ts');
        function updateTime() {
            const now = new Date();
            ts.textContent = now.toLocaleTimeString('en-US', { hour12: false });
        }
        updateTime();
        setInterval(updateTime, 1000);

        // ── PSEUDO PROGRESS PCT ──
        const pct = document.getElementById('pct-label');
        const vals = ['12%','17%','23%','31%','38%','44%','52%','47%','55%','61%','58%'];
        let i = 0;
        setInterval(() => {
            pct.textContent = vals[i++ % vals.length];
        }, 2600);
        pct.textContent = vals[0];
    </script>

</body>
</html>
