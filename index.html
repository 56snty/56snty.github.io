<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
    <title>EMAL // ABSOLUTE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.27/bundled/lenis.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@100;900&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; cursor: none; }
        body { background: #000; color: #fff; font-family: 'Outfit', sans-serif; overflow-x:hidden; height: 1500vh; }
        
        #canvas-container { position:fixed; inset:0; z-index:0; filter: contrast(1.2) brightness(1.1); }
        
        /* The Igloo.inc Signature: Heavy Grain + Chromatic Blur */
        .noise { position:fixed; inset:0; z-index:999; opacity:0.12; pointer-events:none; background:url('https://grainy-gradients.vercel.app/noise.svg'); mix-blend-mode: overlay; }
        
        .vignette { position:fixed; inset:0; z-index:5; background: radial-gradient(circle, transparent 20%, black 100%); pointer-events:none; }

        .hud { position:fixed; inset:0; padding:60px; z-index:100; pointer-events:none; mix-blend-mode: difference; }
        .nav { display:flex; justify-content:space-between; font-size:11px; letter-spacing:0.5em; font-weight:100; text-transform: uppercase; }
        
        .content { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
        .card { 
            opacity: 0; transform: scale(0.5) rotateY(30deg); filter: blur(30px);
            transition: all 1.5s cubic-bezier(0.075, 0.82, 0.165, 1);
            text-align: center; 
        }
        .card.active { opacity: 1; transform: scale(1) rotateY(0deg); filter: blur(0px); }
        
        h2 { font-size: 18vw; font-weight: 900; letter-spacing: -0.08em; line-height: 0.75; text-transform: uppercase; margin:0; }
        p { font-size: 10px; letter-spacing: 15px; opacity: 0.4; margin-top: 40px; font-weight: 100; }

        #cursor { position: fixed; width: 60px; height: 60px; border: 0.5px solid rgba(255,255,255,0.3); border-radius: 50%; pointer-events: none; z-index: 1000; transition: transform 0.2s cubic-bezier(0.1, 0, 0, 1); }
        #cursor-dot { position: fixed; width: 2px; height: 2px; background: #fff; border-radius: 50%; pointer-events: none; z-index: 1000; }
    </style>
</head>
<body>
    <div id="cursor"></div>
    <div id="cursor-dot"></div>
    <div class="noise"></div>
    <div class="vignette"></div>
    <div id="canvas-container"></div>

    <div class="hud">
        <div class="nav">
            <div>EMAL / ARCHIVE</div>
            <div>[ 00 // 03 ]</div>
        </div>
    </div>

    <div class="content"><div class="card" id="c1"><h2>PURE</h2><p>SYSTEMS ARCHITECT</p></div></div>
    <div class="content"><div class="card" id="c2"><h2>FLOW</h2><p>CREATIVE LOGIC</p></div></div>
    <div class="content"><div class="card" id="c3"><h2>END</h2><p>CONTACT_PORTAL</p></div></div>

<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.01, 1000);
const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.getElementById('canvas-container').appendChild(renderer.domElement);

// --- THE MASTERPIECE: GLASS NEBULA TUNNEL ---
const points = [];
for (let i = 0; i <= 40; i++) {
    points.push(new THREE.Vector3(Math.sin(i * 0.3) * 5, Math.cos(i * 0.5) * 5, i * 25));
}
const curve = new THREE.CatmullRomCurve3(points, true);
const tubeGeo = new THREE.TubeGeometry(curve, 512, 5, 64, true);

// Advanced Shader Material with Fresnel & Distortion
const material = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 }, uScroll: { value: 0 } },
    side: THREE.BackSide,
    transparent: true,
    vertexShader: `
        varying vec2 vUv;
        varying float vDistort;
        uniform float uTime;
        void main() {
            vUv = uv;
            vDistort = sin(position.z * 0.05 + uTime) * 0.5;
            vec3 p = position + normal * vDistort;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);
        }
    `,
    fragmentShader: `
        varying vec2 vUv;
        varying float vDistort;
        uniform float uTime;
        void main() {
            vec3 color1 = vec3(0.01, 0.01, 0.02);
            vec3 color2 = vec3(0.2, 0.2, 0.25);
            // Chromatic Aberration Simulation Lines
            float r = step(0.99, sin(vUv.x * 500.0 + vDistort));
            float b = step(0.99, sin(vUv.x * 500.5 + vDistort));
            vec3 lines = vec3(r, 0.1, b) * 0.3;
            float alpha = smoothstep(0.0, 0.5, vUv.y) * 0.5;
            gl_FragColor = vec4(color1 + lines, alpha);
        }
    `
});

const tunnel = new THREE.Mesh(tubeGeo, material);
scene.add(tunnel);

// Volumetric Particles (Star Dust)
const starCount = 15000;
const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(starCount * 3);
for(let i=0; i<starCount*3; i++) starPos[i] = (Math.random()-0.5) * 200;
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.015, transparent: true, opacity: 0.6 }));
scene.add(stars);

// --- HYPER-SMOOTH MOTION ---
const lenis = new Lenis({ lerp: 0.025, smoothWheel: true, infinite: true });
let scrollProgress = 0;

function animate(t) {
    lenis.raf(t);
    const loop = (scrollProgress % 1 + 1) % 1;
    
    // Camera Logic
    const camPos = curve.getPointAt(loop);
    const lookAtPos = curve.getPointAt((loop + 0.02) % 1);
    camera.position.copy(camPos);
    camera.lookAt(lookAtPos);
    
    // Barrel Roll Effect
    camera.rotation.z += Math.sin(t * 0.0005) * 0.2;

    material.uniforms.uTime.value = t * 0.001;
    
    // Particle drift
    stars.rotation.z += 0.0001;
    
    check(loop, 0.15, 'c1');
    check(loop, 0.45, 'c2');
    check(loop, 0.80, 'c3');

    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}

function check(p, target, id) {
    const el = document.getElementById(id);
    const active = p > target && p < target + 0.12;
    el.classList.toggle('active', active);
}

lenis.on('scroll', (e) => { 
    scrollProgress = e.animatedScroll / 20000; 
});

window.addEventListener('mousemove', (e) => {
    document.getElementById('cursor').style.transform = `translate(${e.clientX - 30}px, ${e.clientY - 30}px)`;
    document.getElementById('cursor-dot').style.transform = `translate(${e.clientX - 1}px, ${e.clientY - 1}px)`;
});

requestAnimationFrame(animate);
</script>
</body>
</html>
