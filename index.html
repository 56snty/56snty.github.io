<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>lowkey | emal.dev</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    /* RESET & BASE */
    * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; /* Hide default cursor */ }
    
    html, body { 
      font-family: 'Inter', sans-serif; color: white; 
      background-color: #030303; width: 100vw; height: 100vh; height: 100dvh; 
      overflow: hidden; overscroll-behavior: none; touch-action: none; 
      transition: background-color 0.8s ease, color 0.8s ease;
    }

    body.light-mode { background-color: #e5e5e5; color: #1a1a1a; }

    /* CUSTOM AWWWARDS CURSOR */
    @media (pointer: coarse) { * { cursor: auto !important; } .custom-cursor { display: none !important; } }
    .custom-cursor {
      position: fixed; top: 0; left: 0; width: 12px; height: 12px;
      background: white; border-radius: 50%; pointer-events: none; z-index: 10005;
      transform: translate(-50%, -50%); transition: width 0.3s, height 0.3s, background 0.3s;
      mix-blend-mode: difference;
    }
    .custom-cursor.hovering { width: 45px; height: 45px; background: rgba(255,255,255,0.1); backdrop-filter: blur(4px); mix-blend-mode: normal; border: 1px solid rgba(255,255,255,0.5); }

    /* 35MM FILM GRAIN */
    .film-grain {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      pointer-events: none; z-index: 9998; opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }
    body.light-mode .film-grain { opacity: 0.06; }

    /* 0 TO 100 PRELOADER */
    #preloader {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #030303; display: flex; align-items: center; justify-content: center;
      z-index: 10001; transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1), visibility 1s;
    }
    #progress-text { font-family: 'Playfair Display', serif; font-style: italic; font-size: 13px; letter-spacing: 2px; color: rgba(255,255,255,0.6); }

    /* CINEMATIC HOLD-TO-ENTER INTRO */
    #intro {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 9999; 
      transition: opacity 1.2s cubic-bezier(0.16, 1, 0.3, 1), visibility 1.2s, background-color 0.8s;
    }
    body.light-mode #intro { background: #f5f5f5; color: #1a1a1a; }
    .hold-container { position: relative; display: flex; align-items: center; justify-content: center; width: 150px; height: 150px; }
    #intro h1 { font-family: 'Playfair Display', serif; font-size: 24px; letter-spacing: 4px; font-weight: 500; z-index: 2; user-select: none; }
    .pulse-text { position: absolute; bottom: -20px; opacity: 0.5; font-size: 9px; letter-spacing: 3px; text-transform: uppercase; animation: pulse 2.5s infinite; }
    
    /* The Hold Ring */
    .hold-ring {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      border-radius: 50%; border: 1px solid rgba(255,255,255,0.1);
      z-index: 1; transform: scale(0.8); transition: transform 0.3s;
    }
    body.light-mode .hold-ring { border-color: rgba(0,0,0,0.1); }
    .hold-ring-fill {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      border-radius: 50%; border: 2px solid #fff;
      clip-path: circle(0% at 50% 50%); z-index: 2;
    }
    body.light-mode .hold-ring-fill { border-color: #000; }

    @keyframes pulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.8; } }

    /* BACKGROUND VIDEOS */
    .bg-video {
      position: fixed; top: 50%; left: 50%;
      min-width: 100%; min-height: 100%; width: auto; height: auto;
      transform: translateX(-50%) translateY(-50%); object-fit: cover; z-index: 1; 
      transition: opacity 1s ease-in-out;
    }
    #bg-dark { filter: brightness(0.65) contrast(1.1); opacity: 1; }
    #bg-light { filter: brightness(0.85) contrast(1.05); opacity: 0; }
    body.light-mode #bg-dark { opacity: 0; }
    body.light-mode #bg-light { opacity: 1; }
    canvas { position: fixed; top: 0; left: 0; z-index: 2; pointer-events: none; opacity: 0.6; }

    /* ART PIECE CARD */
    .card-wrapper {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -45%); opacity: 0;
      transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 10; perspective: 1500px; 
    }
    .card-wrapper.show { opacity: 1; transform: translate(-50%, -50%); }
    .card {
      position: relative; overflow: hidden; width: 90vw; max-width: 320px; padding: 35px 25px;
      border-radius: 20px; background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.005) 100%);
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255,255,255,0.05);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      text-align: center; display: flex; flex-direction: column; align-items: center;
      transition: transform 0.1s ease-out, background 0.8s, border 0.8s, box-shadow 0.8s; 
      transform-style: preserve-3d;
    }
    body.light-mode .card {
      background: linear-gradient(135deg, rgba(255,255,255,0.5) 0%, rgba(255,255,255,0.2) 100%);
      border: 1px solid rgba(0, 0, 0, 0.1); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1), inset 0 1px 0 rgba(255,255,255,0.8);
    }
    .glare { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; opacity: 0; transition: opacity 0.4s ease; }
    body.light-mode .glare { display: none; }
    .card > * { z-index: 2; position: relative; }

    /* CARD CONTENTS */
    .local-info { font-size: 9px; font-weight: 400; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); width: 80%; transition: color 0.8s, border-color 0.8s; }
    body.light-mode .local-info { color: rgba(0,0,0,0.5); border-color: rgba(0,0,0,0.1); }
    .avatar-container { position: relative; margin-bottom: 12px; }
    #discord-avatar { width: 64px; height: 64px; border-radius: 50%; object-fit: cover; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 8px 20px rgba(0,0,0,0.6); transition: transform 0.05s ease-out, box-shadow 0.05s ease-out, border 0.8s; }
    body.light-mode #discord-avatar { border: 1px solid rgba(0,0,0,0.1); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
    #status-dot { position: absolute; bottom: 2px; right: 2px; width: 12px; height: 12px; border-radius: 50%; background: #747f8d; border: 2px solid #0a0a0a; transition: border 0.8s; }
    body.light-mode #status-dot { border: 2px solid #ffffff; }
    .card h1 { font-family: 'Playfair Display', serif; font-size: 24px; letter-spacing: 1.5px; margin-bottom: 2px; font-weight: 600; text-shadow: 0 2px 10px rgba(0,0,0,0.8); transition: text-shadow 0.8s; }
    body.light-mode .card h1 { text-shadow: none; color: #111; }
    .type-container { height: 16px; margin-bottom: 12px; font-weight: 300; font-size: 12px; color: rgba(255,255,255,0.6); letter-spacing: 1px; text-transform: lowercase; transition: color 0.8s; }
    body.light-mode .type-container { color: rgba(0,0,0,0.6); }
    .cursor { animation: blink 1s infinite; opacity: 0.5; }
    @keyframes blink { 50% { opacity: 0; } }
    .bio-text { font-size: 11px; font-weight: 300; color: rgba(255,255,255,0.8); font-style: italic; line-height: 1.5; margin-bottom: 20px; padding: 0 10px; letter-spacing: 0.5px; transition: color 0.8s; }
    body.light-mode .bio-text { color: rgba(0,0,0,0.7); }

    /* BUTTONS */
    .btn-group { width: 100%; display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; position: relative; z-index: 50; }
    .btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px; border-radius: 50px; text-decoration: none; color: white; font-weight: 400; font-size: 12px; letter-spacing: 0.5px; background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.5s, border 0.5s, color 0.5s; }
    .btn:hover { background: rgba(255, 255, 255, 0.08); border-color: rgba(255, 255, 255, 0.2); }
    body.light-mode .btn { background: rgba(0, 0, 0, 0.03); border: 1px solid rgba(0, 0, 0, 0.1); color: #111; }
    body.light-mode .btn:hover { background: rgba(0, 0, 0, 0.08); border-color: rgba(0, 0, 0, 0.2); }
    .rank-icon { width: 16px; height: 16px; object-fit: contain; }
    .discord-icon { width: 14px; height: 14px; fill: currentColor; transition: fill 0.8s; }

    /* SPOTIFY */
    #spotify-widget { display: none; width: 100%; padding: 6px 12px 6px 6px; border-radius: 50px; background: rgba(30, 215, 96, 0.05); border: 1px solid rgba(30, 215, 96, 0.15); align-items: center; text-align: left; gap: 10px; transition: all 0.5s ease; position: relative; z-index: 50; }
    #spotify-widget:hover { border-color: rgba(30, 215, 96, 0.4); background: rgba(30, 215, 96, 0.1); }
    body.light-mode #spotify-widget { background: rgba(30, 215, 96, 0.1); border-color: rgba(30, 215, 96, 0.3); }
    #spotify-art { width: 32px; height: 32px; border-radius: 50%; box-shadow: 0 2px 8px rgba(0,0,0,0.5); animation: spin 6s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    .spotify-info { flex: 1; overflow: hidden; }
    .spotify-song { font-size: 11px; font-weight: 500; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color 0.8s; }
    body.light-mode .spotify-song { color: #111; }
    .spotify-artist { font-size: 9px; font-weight: 300; color: rgba(255,255,255,0.5); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color 0.8s; }
    body.light-mode .spotify-artist { color: rgba(0,0,0,0.6); }
    .spotify-icon { width: 14px; opacity: 0.8; }

    /* FOOTER & PROGRESS */
    .card-footer { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-top: 25px; font-size: 9px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 2px; transition: color 0.8s; position: relative; z-index: 99; }
    body.light-mode .card-footer { color: rgba(0,0,0,0.5); }
    .controls { transition: color 0.3s ease; padding: 5px; } 
    .controls:hover { color: rgba(255,255,255,0.9); }
    body.light-mode .controls:hover { color: #111; }
    .views { display: flex; align-items: center; gap: 4px; padding: 5px; }
    .progress-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 2px; background: rgba(255,255,255,0.05); transition: background 0.8s; z-index: 3; }
    .progress-bar { height: 100%; width: 0%; background: rgba(255,255,255,0.6); transition: width 0.1s linear, background 0.8s; }
    body.light-mode .progress-container { background: rgba(0,0,0,0.05); }
    body.light-mode .progress-bar { background: rgba(0,0,0,0.4); }

    /* RIGHT CLICK MENU */
    .context-menu { position: fixed; z-index: 10000; width: 180px; background: rgba(15, 15, 15, 0.6); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-radius: 12px; padding: 6px; opacity: 0; transform: scale(0.95); pointer-events: none; transition: opacity 0.2s ease, transform 0.2s ease, background 0.8s, border 0.8s; }
    .context-menu.active { opacity: 1; transform: scale(1); pointer-events: auto; }
    .context-menu ul { list-style: none; }
    .context-menu li { padding: 10px 12px; font-size: 11px; color: rgba(255,255,255,0.8); border-radius: 6px; transition: background 0.2s, color 0.2s; letter-spacing: 0.5px; }
    .context-menu li:hover { background: rgba(255,255,255,0.1); color: #fff; }
    body.light-mode .context-menu { background: rgba(255, 255, 255, 0.6); border: 1px solid rgba(0, 0, 0, 0.08); box-shadow: 0 20px 40px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.8); }
    body.light-mode .context-menu li { color: rgba(0,0,0,0.7); }
    body.light-mode .context-menu li:hover { background: rgba(0,0,0,0.05); color: #000; }
  </style>
</head>

  <script>
    // --- MAGNETIC CUSTOM CURSOR ---
    const cursor = document.getElementById("customCursor");
    let mouseX = 0, mouseY = 0, cursorX = 0, cursorY = 0;
    
    document.addEventListener("mousemove", (e) => {
      mouseX = e.clientX; mouseY = e.clientY;
    });
    // Spring physics animation loop for cursor
    function animateCursor() {
      let dx = mouseX - cursorX;
      let dy = mouseY - cursorY;
      cursorX += dx * 0.2; // The spring tension
      cursorY += dy * 0.2;
      cursor.style.transform = `translate(${cursorX}px, ${cursorY}px)`;
      requestAnimationFrame(animateCursor);
    }
    animateCursor();

    // Hover expand effect
    const hoverTargets = document.querySelectorAll('.hover-target, .context-menu li');
    hoverTargets.forEach(target => {
      target.addEventListener('mouseenter', () => cursor.classList.add('hovering'));
      target.addEventListener('mouseleave', () => cursor.classList.remove('hovering'));
    });

    // --- 0 TO 100 PRELOADER ---
    document.addEventListener('DOMContentLoaded', () => {
      const preloader = document.getElementById('preloader');
      const progressText = document.getElementById('progress-text');
      let loadProgress = 0;
      function updateLoader() {
        loadProgress += Math.floor(Math.random() * 3) + 1; 
        if (loadProgress > 100) loadProgress = 100;
        progressText.innerText = `${loadProgress}%`;
        if (loadProgress < 100) {
          setTimeout(updateLoader, Math.random() * 20 + 10);
        } else {
          setTimeout(() => {
            preloader.style.opacity = '0';
            setTimeout(() => { preloader.style.visibility = 'hidden'; }, 1000);
          }, 300);
        }
      }
      updateLoader();
    });

    // --- HOLD TO ENTER HAPTICS ---
    const holdContainer = document.getElementById('holdContainer');
    const holdFill = document.getElementById('holdFill');
    const holdRing = document.getElementById('holdRing');
    let holdTimer;
    let holdProgress = 0;
    let isHolding = false;
    let siteEntered = false;

    function startHold(e) {
      if(siteEntered) return;
      isHolding = true;
      holdRing.style.transform = 'scale(1)';
      if (navigator.vibrate) navigator.vibrate(50); // Initial haptic tap
      
      holdTimer = setInterval(() => {
        holdProgress += 2;
        holdFill.style.clipPath = `circle(${holdProgress}% at 50% 50%)`;
        
        // Vibrate faster as it fills (if on mobile)
        if (holdProgress % 20 === 0 && navigator.vibrate) navigator.vibrate(15);

        if (holdProgress >= 75) {
          clearInterval(holdTimer);
          isHolding = false;
          if (navigator.vibrate) navigator.vibrate([100, 50, 100]); // Unlock haptics
          enterSite();
        }
      }, 15);
    }

    function stopHold() {
      if(siteEntered) return;
      isHolding = false;
      clearInterval(holdTimer);
      holdProgress = 0;
      holdFill.style.clipPath = `circle(0% at 50% 50%)`;
      holdRing.style.transform = 'scale(0.8)';
    }

    holdContainer.addEventListener('mousedown', startHold);
    holdContainer.addEventListener('mouseup', stopHold);
    holdContainer.addEventListener('mouseleave', stopHold);
    holdContainer.addEventListener('touchstart', (e) => { e.preventDefault(); startHold(); });
    holdContainer.addEventListener('touchend', stopHold);


    // --- SPATIAL AUDIO (LOW-PASS FILTER) ---
    let audioCtx, analyzer, dataArray, biquadFilter;
    const music = document.getElementById('music');
    const progressBar = document.getElementById('audioProgress');

    function muffleAudio(muffle) {
      if (!biquadFilter || !audioCtx) return;
      // 24000 is open (normal), 800 is muffled (underwater)
      const targetFreq = muffle ? 800 : 24000;
      biquadFilter.frequency.setTargetAtTime(targetFreq, audioCtx.currentTime, 0.5);
    }

    music.addEventListener('timeupdate', () => {
      if (music.duration) progressBar.style.width = `${(music.currentTime / music.duration) * 100}%`;
    });

    function initVisualizer() {
      if (audioCtx) return; 
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      analyzer = audioCtx.createAnalyser();
      biquadFilter = audioCtx.createBiquadFilter();
      
      // Setup the Underwater Filter
      biquadFilter.type = "lowpass";
      biquadFilter.frequency.value = 24000; 

      const source = audioCtx.createMediaElementSource(music);
      
      // Route: Source -> Filter -> Analyzer -> Speakers
      source.connect(biquadFilter);
      biquadFilter.connect(analyzer);
      analyzer.connect(audioCtx.destination);
      
      analyzer.fftSize = 256;
      dataArray = new Uint8Array(analyzer.frequencyBinCount);
      const avatar = document.getElementById('discord-avatar');
      
      function renderFrame() {
        requestAnimationFrame(renderFrame);
        analyzer.getByteFrequencyData(dataArray);
        let bass = (dataArray[1] + dataArray[2] + dataArray[3]) / 3;
        let scale = 1 + (bass / 1500); 
        let glow = bass / 6;
        let isLight = document.body.classList.contains('light-mode');
        if(bass > 50) {
          avatar.style.transform = `scale(${scale})`;
          avatar.style.boxShadow = isLight ? `0 8px 20px rgba(0,0,0,0.15)` : `0 8px 20px rgba(0,0,0,0.6), 0 0 ${glow}px rgba(255, 255, 255, ${glow/60})`;
        } else {
          avatar.style.transform = `scale(1)`;
          avatar.style.boxShadow = isLight ? `0 8px 20px rgba(0,0,0,0.15)` : `0 8px 20px rgba(0,0,0,0.6)`;
        }
      }
      renderFrame();
    }

    // --- MAIN ENGINE ---
    const intro = document.getElementById('intro');
    const cardWrap = document.getElementById('cardWrap');
    const bgDark = document.getElementById('bg-dark');
    const bgLight = document.getElementById('bg-light');
    const musicBtn = document.getElementById('musicToggle');
    const themeBtn = document.getElementById('themeToggle');
    
    let isPlaying = true;
    let isLightMode = false;

    function enterSite() {
      siteEntered = true;
      intro.style.opacity = '0';
      setTimeout(() => { intro.style.visibility = 'hidden'; }, 1200);
      cardWrap.classList.add("show");
      
      bgDark.play().catch(e => console.error(e));
      bgLight.play().catch(e => console.error(e));
      
      music.volume = 0.4; 
      music.play().then(() => initVisualizer()).catch(e => console.error(e));
    }

    function toggleMusic() {
      if (isPlaying) {
        music.pause(); musicBtn.innerText = "[ Play ]"; ctxAudioBtn.innerText = "Play Audio"; 
      } else {
        music.play(); musicBtn.innerText = "[ Pause ]"; ctxAudioBtn.innerText = "Pause Audio"; 
        if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      }
      isPlaying = !isPlaying;
    }

    function toggleTheme() {
      isLightMode = !isLightMode;
      document.body.classList.toggle('light-mode', isLightMode);
      themeBtn.innerText = isLightMode ? "[ DARK ]" : "[ LIGHT ]";
      ctxThemeBtn.innerText = isLightMode ? "Switch to Dark Mode" : "Switch to Light Mode";
      setTimeout(() => {
        music.src = isLightMode ? "music-light.mp3" : "music.mp3";
        music.load();
        if (isPlaying) { music.play().catch(e => console.log(e)); }
      }, 400); 
    }

    // --- DYNAMIC TAB TITLE & AUDIO MUFFLE ---
    let originalTitle = document.title;
    document.addEventListener("visibilitychange", () => {
      if (document.hidden) { 
        document.title = "stay lowkey..."; 
        muffleAudio(true); // Underwater effect when tab is hidden
      } else { 
        document.title = originalTitle; 
        muffleAudio(false); // Restore HD audio when back
      }
    });

    // --- CUSTOM CONTEXT MENU ---
    const ctxMenu = document.getElementById("customContextMenu");
    const ctxThemeBtn = document.getElementById("ctxTheme");
    const ctxAudioBtn = document.getElementById("ctxAudio");
    const ctxCopyBtn = document.getElementById("ctxCopy");

    window.addEventListener("contextmenu", (e) => {
      e.preventDefault(); 
      muffleAudio(true); // Muffle audio while menu is open

      let x = e.clientX; let y = e.clientY;
      const menuWidth = 180; const menuHeight = 130;
      if (x + menuWidth > window.innerWidth) x = window.innerWidth - menuWidth - 10;
      if (y + menuHeight > window.innerHeight) y = window.innerHeight - menuHeight - 10;

      ctxMenu.style.left = `${x}px`; ctxMenu.style.top = `${y}px`;
      ctxMenu.classList.add("active");
    });

    window.addEventListener("click", () => {
      if (ctxMenu.classList.contains("active")) {
        ctxMenu.classList.remove("active");
        muffleAudio(false); // Restore audio when menu closes
      }
    });

    function copyDiscordId() {
      navigator.clipboard.writeText("285468327135019019").then(() => {
        const originalText = ctxCopyBtn.innerText;
        ctxCopyBtn.innerText = "Copied!";
        setTimeout(() => { ctxCopyBtn.innerText = originalText; }, 1500);
      });
    }

    // --- 3D TILT & GLARE ---
    const tiltCard = document.getElementById('tiltCard');
    const glare = document.getElementById('glare');
    document.addEventListener('mousemove', (e) => {
      if (window.innerWidth > 768) { 
        const xAxis = (window.innerWidth / 2 - e.pageX) / 35; 
        const yAxis = (window.innerHeight / 2 - e.pageY) / 35;
        tiltCard.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        const xPos = (e.clientX / window.innerWidth) * 100;
        const yPos = (e.clientY / window.innerHeight) * 100;
        glare.style.background = `radial-gradient(circle at ${xPos}% ${yPos}%, rgba(255,255,255,0.08) 0%, transparent 60%)`;
        glare.style.opacity = 1;
      }
    });
    document.addEventListener('mouseleave', () => { tiltCard.style.transform = `rotateY(0deg) rotateX(0deg)`; glare.style.opacity = 0; });

    const magneticBtns = document.querySelectorAll('.btn');
    magneticBtns.forEach(btn => {
      btn.addEventListener('mousemove', function(e) {
        if (window.innerWidth > 768) {
          const rect = this.getBoundingClientRect();
          const x = e.clientX - rect.left - rect.width / 2;
          const y = e.clientY - rect.top - rect.height / 2;
          this.style.transform = `translate(${x * 0.25}px, ${y * 0.25}px)`;
        }
      });
      btn.addEventListener('mouseleave', function() { this.style.transform = `translate(0px, 0px)`; });
    });

    // --- APIS (WEATHER, VIEWS, LANYARD) ---
    async function fetchWeather() {
      try {
        const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=51.4416&longitude=5.4697&current_weather=true");
        const data = await res.json();
        document.getElementById('local-info').innerText = `Eindhoven // ${new Date().toLocaleTimeString('en-US', { timeZone: 'Europe/Amsterdam', hour: '2-digit', minute: '2-digit' })} // ${Math.round(data.current_weather.temperature)}°C`;
      } catch (err) {}
    }
    fetchWeather(); setInterval(fetchWeather, 60000);

    fetch("https://api.counterapi.dev/v1/lowkey-emal-dev/visits/up")
      .then(res => res.json())
      .then(data => { document.getElementById("view-count").innerText = data.count; })
      .catch(() => { document.getElementById("view-count").innerText = "-"; });

    const words = ["stay lowkey", "calm energy", "radiant mind"];
    let i = 0, j = 0, isDeleting = false;
    function typeEffect() {
      const currentWord = words[i];
      document.getElementById("type").textContent = currentWord.substring(0, j);
      if (!isDeleting && j === currentWord.length) { isDeleting = true; setTimeout(typeEffect, 2000); return; }
      if (isDeleting && j === 0) { isDeleting = false; i = (i + 1) % words.length; }
      j += isDeleting ? -1 : 1;
      setTimeout(typeEffect, isDeleting ? 30 : 80);
    }
    typeEffect();

    function fetchLanyard() {
      fetch("https://api.lanyard.rest/v1/users/285468327135019019")
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            const d = data.data;
            if (d.discord_user.avatar) {
              const avatarExt = d.discord_user.avatar.startsWith('a_') ? 'gif' : 'webp';
              document.getElementById("discord-avatar").src = `https://cdn.discordapp.com/avatars/${d.discord_user.id}/${d.discord_user.avatar}.${avatarExt}?size=128`;
            }
            const colors = { online: '#43b581', idle: '#faa61a', dnd: '#f04747', offline: '#747f8d' };
            document.getElementById("status-dot").style.background = colors[d.discord_status] || colors.offline;
            const customStatus = d.activities.find(a => a.type === 4);
            if (customStatus && customStatus.state) {
               const emoji = customStatus.emoji ? (customStatus.emoji.id ? '' : customStatus.emoji.name + ' ') : '';
               document.getElementById("discord-bio").innerText = `"${emoji}${customStatus.state}"`;
            } else { document.getElementById("discord-bio").innerText = `"staying lowkey."`; }
            
            const spotifyWidget = document.getElementById("spotify-widget");
            if (d.listening_to_spotify && d.spotify) {
              document.getElementById("spotify-art").src = d.spotify.album_art_url;
              document.getElementById("spotify-song").innerText = d.spotify.song;
              document.getElementById("spotify-artist").innerText = d.spotify.artist;
              spotifyWidget.style.display = "flex";
            } else { spotifyWidget.style.display = "none"; }
          }
        }).catch(err => console.log("Lanyard fetch error:", err));
    }
    fetchLanyard(); setInterval(fetchLanyard, 3000);

    // --- SMART RAIN ---
    const canvas = document.getElementById("rain"); const ctx = canvas.getContext("2d");
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resizeCanvas); resizeCanvas();
    let rainDrops = Array.from({length: 60}, () => ({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, l: Math.random() * 10 + 5, s: Math.random() * 2 + 1.5 }));
    function drawRain() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = document.body.classList.contains('light-mode') ? "rgba(0, 0, 0, 0.15)" : "rgba(255, 255, 255, 0.05)"; 
      ctx.lineWidth = 1; ctx.lineCap = 'round';
      rainDrops.forEach(r => {
        ctx.beginPath(); ctx.moveTo(r.x, r.y); ctx.lineTo(r.x, r.y + r.l); ctx.stroke();
        r.y += r.s; if (r.y > canvas.height) { r.y = -20; r.x = Math.random() * canvas.width; }
      });
      requestAnimationFrame(drawRain);
    }
    drawRain();
  </script>

</body>
</html>
