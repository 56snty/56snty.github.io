<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>lowkey | emal.dev</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; color: white; overflow: hidden; background-color: #050505; }

    #intro {
      position: fixed; width: 100%; height: 100%;
      background: black; display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 10; cursor: pointer;
      transition: opacity 0.8s ease, visibility 0.8s;
    }
    .pulse-text { opacity: 0.6; font-size: 14px; margin-top: 10px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.9; } }

    video {
      position: fixed; top: 50%; left: 50%;
      min-width: 100%; min-height: 100%; width: auto; height: auto;
      transform: translateX(-50%) translateY(-50%);
      object-fit: cover; z-index: -2; filter: brightness(0.4);
    }
    canvas { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }

    .card {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -45%);
      opacity: 0; width: 90%; max-width: 360px; padding: 30px;
      border-radius: 24px; background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      text-align: center; transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .card.show { opacity: 1; transform: translate(-50%, -50%); }

    h1 { font-family: 'Playfair Display', serif; font-size: 28px; letter-spacing: 1px; }
    .type-container { height: 20px; margin: 8px 0 16px; font-weight: 300; }
    .type { opacity: 0.8; }
    .cursor { animation: blink 1s infinite; opacity: 0.8; }
    @keyframes blink { 50% { opacity: 0; } }

    .badge {
      font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px;
      background: rgba(255, 255, 255, 0.15); padding: 5px 12px;
      border-radius: 999px; margin-bottom: 15px; display: inline-block;
    }

    .btn {
      display: block; padding: 12px; margin-top: 15px;
      border-radius: 12px; background: rgba(255, 255, 255, 0.1);
      text-decoration: none; color: white; font-weight: 500;
      transition: background 0.3s ease, transform 0.2s ease;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .btn:hover { background: rgba(255, 255, 255, 0.2); transform: translateY(-2px); }

    .box {
      margin-top: 12px; padding: 12px;
      border-radius: 12px; background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 13px; font-weight: 300; color: #ddd;
    }

    iframe { margin-top: 12px; border-radius: 12px; width: 100%; border: none; }
    
    .controls {
      margin-top: 20px; font-size: 12px; cursor: pointer; opacity: 0.5;
      text-transform: uppercase; letter-spacing: 1px; transition: opacity 0.3s ease;
    }
    .controls:hover { opacity: 1; }
  </style>
</head>

<body>

  <div id="intro" onclick="enterSite()">
    <h1>lowkey</h1>
    <span class="pulse-text">click to enter</span>
  </div>

  <video id="bg" autoplay loop muted playsinline>
    <source src="https://cdn.pixabay.com/video/2020/07/22/45384-443180295_tiny.mp4" type="video/mp4">
  </video>
  
  <canvas id="rain"></canvas>

  <div class="card" id="card">
    <h1>lowkey</h1>
    <div class="type-container">
      <span class="type" id="type"></span><span class="cursor">|</span>
    </div>
    
    <div class="badge">exclusive</div>
    
    <div style="font-weight: 300; font-size: 14px;">
      4owkey#prx <br><span style="opacity:0.6; font-size: 12px;">Radiant</span>
    </div>

    <a href="https://discord.com/users/285468327135019019" target="_blank" class="btn">Discord Profile</a>

    <div class="box" id="discord">Fetching Discord...</div>

    <iframe src="https://open.spotify.com/embed/track/4cOdK2wGLETKBW3PvgPWqT?utm_source=generator&theme=0" 
            height="80" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy">
    </iframe>

    <div class="box">Riot: Radiant (4owkey#prx)</div>

    <div class="controls" id="musicToggle" onclick="toggleMusic()">Pause Music</div>
  </div>

  <audio id="music" loop>
    <source src="https://cdn.pixabay.com/audio/2022/10/25/audio_946f06f6c7.mp3" type="audio/mpeg">
  </audio>

  <script>
    const intro = document.getElementById('intro');
    const card = document.getElementById('card');
    const bgVideo = document.getElementById('bg');
    const music = document.getElementById('music');
    const musicBtn = document.getElementById('musicToggle');

    function enterSite() {
      intro.style.opacity = '0';
      setTimeout(() => { intro.style.visibility = 'hidden'; }, 800);
      card.classList.add("show");
      
      bgVideo.play().catch(e => console.log("Video restricted:", e));
      music.play().catch(e => console.log("Audio restricted:", e));
    }

    const words = ["Radiant", "stay lowkey", "calm energy"];
    let i = 0, j = 0, isDeleting = false;

    function typeEffect() {
      const currentWord = words[i];
      document.getElementById("type").textContent = currentWord.substring(0, j);

      if (!isDeleting && j === currentWord.length) {
        isDeleting = true;
        setTimeout(typeEffect, 1500);
        return;
      }
      if (isDeleting && j === 0) {
        isDeleting = false;
        i = (i + 1) % words.length;
      }

      j += isDeleting ? -1 : 1;
      setTimeout(typeEffect, isDeleting ? 40 : 100);
    }
    typeEffect();

    let isPlaying = true;
    function toggleMusic() {
      if (isPlaying) {
        music.pause();
        musicBtn.innerText = "Play Music";
      } else {
        music.play();
        musicBtn.innerText = "Pause Music";
      }
      isPlaying = !isPlaying;
    }

    // Discord Lanyard Fetch
    fetch("https://api.lanyard.rest/v1/users/285468327135019019")
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          const d = data.data;
          const status = d.discord_status.charAt(0).toUpperCase() + d.discord_status.slice(1);
          document.getElementById("discord").innerText = 
            `Discord: ${status}` + (d.listening_to_spotify ? " • Spotify" : "");
        } else {
          // If not in Lanyard server, it triggers this
          document.getElementById("discord").innerText = "Join discord.gg/lanyard to link!";
        }
      })
      .catch(error => {
        document.getElementById("discord").innerText = "Discord status unavailable";
      });

    const canvas = document.getElementById("rain");
    const ctx = canvas.getContext("2d");
    
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    let rainDrops = Array.from({length: 120}, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      l: Math.random() * 15 + 5,
      s: Math.random() * 3 + 2 
    }));

    function drawRain() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = "rgba(255, 255, 255, 0.15)";
      ctx.lineWidth = 1;
      ctx.lineCap = 'round';
      
      rainDrops.forEach(r => {
        ctx.beginPath();
        ctx.moveTo(r.x, r.y);
        ctx.lineTo(r.x, r.y + r.l);
        ctx.stroke();
        
        r.y += r.s;
        if (r.y > canvas.height) {
          r.y = -20;
          r.x = Math.random() * canvas.width;
        }
      });
      requestAnimationFrame(drawRain);
    }
    drawRain();
  </script>

</body>
</html>
