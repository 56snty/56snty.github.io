<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>EMAL // INFERNO_V7</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.27/bundled/lenis.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; cursor: none; }
        body { background: #000; color: #fff; font-family: monospace; overflow-x:hidden; height: 500vh; }
        #canvas-container { position:fixed; inset:0; z-index:0; }
        .ui { position:fixed; inset:0; padding:30px; pointer-events:none; z-index:100; mix-blend-mode: screen; }
        h1 { position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); font-size:15vw; font-weight:900; filter: blur(10px); opacity:0.5; }
        .sync-btn { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            padding: 10px 20px; border: 1px solid #ff4400; color: #ff4400;
            background: none; font-family: monospace; cursor: pointer; pointer-events: all;
            box-shadow: 0 0 15px #ff440055; text-transform: uppercase; letter-spacing: 2px;
        }
        #status-light { width: 10px; height: 10px; border-radius: 50%; display: inline-block; background: #555; margin-right: 10px; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="ui">
        <div style="display:flex; justify-content:space-between; font-size:10px;">
            <div><span id="status-light"></span> NODE: <span id="node-name">SEARCHING...</span></div>
            <div>[ FLAME_ENGINE_ACTIVE ]</div>
        </div>
        <h1>INFERNO</h1>
    </div>
    <button class="sync-btn" onclick="forceSync()">Magic Sync Connect</button>

<script>
const bc = new BroadcastChannel('FLAME_SYNC');
const nodeName = document.getElementById('node-name');
const statusLight = document.getElementById('status-light');

function forceSync() {
    bc.postMessage({ type: 'PING' });
    alert("Sending Magic Signal...");
}

bc.onmessage = (e) => {
    statusLight.style.background = "#ff4400";
    statusLight.style.boxShadow = "0 0 20px #ff4400";
    nodeName.textContent = "CONNECTED_REMOTE";
    if(e.data.scroll) targetScroll = e.data.scroll;
};

// --- THREE.JS FLAME CORE ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.getElementById('canvas-container').appendChild(renderer.setPixelRatio(window.devicePixelRatio));

const material = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 }, uScroll: { value: 0 } },
    transparent: true,
    vertexShader: `
        varying vec2 vUv;
        varying float vNoise;
        uniform float uTime;
        uniform float uScroll;
        void main() {
            vUv = uv;
            float n = sin(position.x * 3.0 + uTime) * cos(position.y * 3.0 + uTime);
            vNoise = n * (0.5 + uScroll * 2.0);
            vec3 p = position + normal * vNoise;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);
        }
    `,
    fragmentShader: `
        varying float vNoise;
        varying vec2 vUv;
        uniform float uTime;
        void main() {
            vec3 colorA = vec3(0.1, 0.0, 0.0); // Deep Dark
            vec3 colorB = vec3(1.0, 0.2, 0.0); // Orange Flame
            vec3 colorC = vec3(1.0, 0.8, 0.0); // Bright Gold
            
            vec3 finalColor = mix(colorA, colorB, vNoise + 0.5);
            finalColor = mix(finalColor, colorC, pow(vNoise, 3.0));
            
            float alpha = smoothstep(-1.0, 1.0, vNoise + 0.8);
            gl_FragColor = vec4(finalColor, alpha);
        }
    `
});

const sphere = new THREE.Mesh(new THREE.IcosahedronGeometry(2, 64), material);
scene.add(sphere);
camera.position.z = 5;

let targetScroll = 0, currentScroll = 0;
const lenis = new Lenis();
lenis.on('scroll', (e) => {
    targetScroll = e.progress;
    bc.postMessage({ scroll: e.progress });
});

function animate(t) {
    lenis.raf(t);
    currentScroll += (targetScroll - currentScroll) * 0.05;
    material.uniforms.uTime.value = t * 0.002;
    material.uniforms.uScroll.value = currentScroll;
    sphere.rotation.y += 0.01 + (currentScroll * 0.05);
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
</script>
</body>
</html>
