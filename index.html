<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>AETHER // PORTAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.27/bundled/lenis.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; cursor: none; }
        body { background: #000; color: #fff; font-family: 'Georgia', serif; overflow-x:hidden; height: 1000vh; }
        #canvas-container { position:fixed; inset:0; z-index:0; }
        .hud { position:fixed; inset:0; padding:50px; display:flex; flex-direction:column; justify-content:space-between; z-index:100; pointer-events:none; }
        .realm-tag { font-size: 10px; letter-spacing: 5px; text-transform: uppercase; opacity: 0.5; }
        .title-wrap { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; width: 100%; }
        h1 { font-size: 10vw; font-weight: 100; font-style: italic; letter-spacing: -0.02em; filter: blur(5px); opacity: 0; transition: all 1s ease; }
        .active h1 { filter: blur(0px); opacity: 1; }
        .grain { position:fixed; inset:0; z-index:999; opacity:0.1; pointer-events:none; background:url('https://grainy-gradients.vercel.app/noise.svg'); }
    </style>
</head>
<body>
    <div class="grain"></div>
    <div id="canvas-container"></div>
    <div class="hud">
        <div class="realm-tag">Realm_04 // Aether_Flow</div>
        <div class="realm-tag" style="text-align:right;">Distance: <span id="dist">0m</span></div>
    </div>
    <div class="title-wrap" id="trigger">
        <h1 id="realm-name">THE_BEYOND</h1>
    </div>

<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.getElementById('canvas-container').appendChild(renderer.domElement);

// --- CREATE THE INFINITE PATH ---
const points = [];
for (let i = 0; i < 50; i++) {
    points.push(new THREE.Vector3(Math.sin(i * 0.3) * 2, Math.cos(i * 0.3) * 2, i * 5));
}
const curve = new THREE.CatmullRomCurve3(points);
const tubeGeometry = new THREE.TubeGeometry(curve, 200, 1.5, 20, false);

// --- PROCEDURAL REALM MATERIAL ---
const material = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 }, uScroll: { value: 0 } },
    side: THREE.BackSide,
    transparent: true,
    vertexShader: `
        varying vec2 vUv;
        void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    `,
    fragmentShader: `
        varying vec2 vUv;
        uniform float uTime;
        uniform float uScroll;
        void main() {
            vec3 color1 = vec3(0.0, 0.1, 0.2); // Deep Void
            vec3 color2 = vec3(0.5, 0.1, 1.0); // Neon Pulse
            
            float ring = smoothstep(0.4, 0.5, sin(vUv.x * 50.0 + uTime * 5.0 + uScroll * 100.0));
            vec3 finalColor = mix(color1, color2, ring * 0.5);
            
            // Add stars/dust
            float dust = pow(fract(sin(dot(vUv, vec2(12.98, 78.23))) * 43758.54), 20.0);
            finalColor += dust;
            
            gl_FragColor = vec4(finalColor, 1.0);
        }
    `
});

const tube = new THREE.Mesh(tubeGeometry, material);
scene.add(tube);

// --- ANIMATION & CAMERA FLY-THROUGH ---
const lenis = new Lenis({ lerp: 0.05, wheelMultiplier: 0.8 });
let progress = 0;

function animate(t) {
    lenis.raf(t);
    material.uniforms.uTime.value = t * 0.001;
    
    // Camera follows the path based on scroll
    const camPos = curve.getPointAt(progress % 1);
    const lookAtPos = curve.getPointAt((progress + 0.01) % 1);
    camera.position.copy(camPos);
    camera.lookAt(lookAtPos);
    
    material.uniforms.uScroll.value = progress;
    document.getElementById('dist').textContent = Math.floor(progress * 1000) + "m";
    
    // UI Effects
    if(progress > 0.1) document.getElementById('trigger').classList.add('active');
    
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}

lenis.on('scroll', (e) => {
    progress = e.progress;
});

requestAnimationFrame(animate);

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
