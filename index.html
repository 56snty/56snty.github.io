<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>ZENITH // EMAL.DEV</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.27/bundled/lenis.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; cursor: none; }
        body { background: #000; color: #fff; font-family: monospace; overflow:hidden; height: 400vh; }
        #canvas-container { position:fixed; inset:0; z-index:0; touch-action: none; }
        .ui { position:fixed; inset:0; padding:20px; pointer-events:none; z-index:100; display:flex; flex-direction:column; justify-content:space-between; mix-blend-mode: difference; }
        h1 { position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); font-size:18vw; font-weight:900; letter-spacing:-0.05em; text-align:center; width:100%; }
        .mobile-hint { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); font-size:8px; opacity:0.4; letter-spacing:2px; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="ui">
        <div style="display:flex; justify-content:space-between; font-size:9px; opacity:0.6;">
            <div>EMAL.ZENITH_MOBILE_V8.1</div>
            <div id="sync-status">● SYSTEM_READY</div>
        </div>
        <h1>ZENITH</h1>
        <div class="mobile-hint">SCROLL_TO_IGNITE</div>
    </div>

<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.getElementById('canvas-container').appendChild(renderer.domElement);

// Optimized Fire Material for Mobile
const material = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 }, uScroll: { value: 0 } },
    vertexShader: `
        varying float vN;
        uniform float uTime;
        uniform float uScroll;
        void main() {
            float n = sin(position.x * 2.0 + uTime) * cos(position.y * 2.0 + uTime);
            vN = n * (0.2 + uScroll * 1.5);
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position + normal * vN, 1.0);
        }
    `,
    fragmentShader: `
        varying float vN;
        void main() {
            vec3 fire = mix(vec3(0.1, 0.0, 0.0), vec3(1.0, 0.4, 0.0), vN + 0.5);
            fire += vec3(0.0, 0.2, 0.8) * pow(vN, 4.0); // Magic Glow
            gl_FragColor = vec4(fire, 1.0);
        }
    `
});

// Lower poly geometry (32 instead of 64) for mobile stability
const core = new THREE.Mesh(new THREE.IcosahedronGeometry(2, 32), material);
scene.add(core);
camera.position.z = 5;

const lenis = new Lenis();
let scroll = 0;
lenis.on('scroll', (e) => { 
    scroll = e.progress;
    document.querySelector('h1').style.filter = `blur(${scroll * 20}px)`;
});

function animate(t) {
    lenis.raf(t);
    material.uniforms.uTime.value = t * 0.0015;
    material.uniforms.uScroll.value = scroll;
    core.rotation.y += 0.005 + (scroll * 0.03);
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

// Resize fix for mobile rotation
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
