<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>EMAL // BEYOND</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.27/bundled/lenis.min.js"></script>
    <style>
        :root { --accent: #00f3ff; }
        * { margin:0; padding:0; box-sizing:border-box; cursor: none; }
        body { background: #000; color: #fff; font-family: "Helvetica Neue", sans-serif; overflow-x:hidden; height: 1200vh; }
        #canvas-container { position:fixed; inset:0; z-index:0; }
        
        /* High-End UI */
        .hud { position:fixed; inset:0; padding:40px; z-index:100; pointer-events:none; display:flex; flex-direction:column; justify-content:space-between; mix-blend-mode: difference; }
        .nav-top { display:flex; justify-content:space-between; font-size:10px; letter-spacing:4px; font-weight:900; }
        
        /* Portfolio Content Plates */
        .content-layer { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 10; }
        .project-card { 
            opacity: 0; transform: translateY(50px) scale(0.9); transition: all 0.8s cubic-bezier(0.2, 1, 0.3, 1);
            text-align: center; max-width: 600px;
        }
        .project-card.active { opacity: 1; transform: translateY(0) scale(1); }
        .project-card h2 { font-size: 8vw; font-weight: 900; letter-spacing: -0.05em; line-height: 0.8; margin-bottom: 20px; }
        .project-card p { font-size: 12px; letter-spacing: 2px; opacity: 0.5; text-transform: uppercase; }

        #cursor { position: fixed; width: 10px; height: 10px; background: #fff; border-radius: 50%; pointer-events: none; z-index: 1000; mix-blend-mode: difference; }
        .noise { position:fixed; inset:0; z-index:999; opacity:0.04; pointer-events:none; background:url('https://grainy-gradients.vercel.app/noise.svg'); }
    </style>
</head>
<body>
    <div id="cursor"></div>
    <div class="noise"></div>
    <div id="canvas-container"></div>

    <div class="hud">
        <div class="nav-top">
            <div>EMAL.DEV</div>
            <div id="status">INIT_FLIGHT...</div>
            <div>[ 2026 ]</div>
        </div>
        <div class="nav-top" style="opacity:0.3">
            <div>SCROLL_TO_TRAVEL</div>
            <div id="depth">DEPTH: 000m</div>
        </div>
    </div>

    <div class="content-layer">
        <div class="project-card" id="p1">
            <p>01 / THE BEGINNING</p>
            <h2>EMAL</h2>
        </div>
    </div>
    <div class="content-layer">
        <div class="project-card" id="p2">
            <p>02 / VISUAL MASTER</p>
            <h2>CREATIVE_DEVELOPER</h2>
        </div>
    </div>
    <div class="content-layer">
        <div class="project-card" id="p3">
            <p>03 / RECENT WORK</p>
            <h2>BEYOND_REALMS</h2>
        </div>
    </div>

<script>
// --- THREE.JS REALM ENGINE ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.getElementById('canvas-container').appendChild(renderer.domElement);

// Create Infinite Star-Tunnel Path
const points = [];
for (let i = 0; i < 100; i++) {
    points.push(new THREE.Vector3(Math.sin(i * 0.2) * 3, Math.cos(i * 0.3) * 3, i * 10));
}
const curve = new THREE.CatmullRomCurve3(points);
const tubeGeo = new THREE.TubeGeometry(curve, 300, 2, 8, false);
const material = new THREE.MeshBasicMaterial({ color: 0x111111, wireframe: true, transparent: true, opacity: 0.2 });
const tunnel = new THREE.Mesh(tubeGeo, material);
scene.add(tunnel);

// Floating Star Field
const starGeo = new THREE.BufferGeometry();
const starPos = [];
for(let i=0; i<3000; i++) {
    starPos.push((Math.random()-0.5)*50, (Math.random()-0.5)*50, Math.random()*1000);
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({color:0xffffff, size:0.05}));
scene.add(stars);

// --- SCROLL & FLY LOGIC ---
const lenis = new Lenis({ lerp: 0.05 });
let progress = 0;

function animate(t) {
    lenis.raf(t);
    
    // Smooth camera fly
    const camPos = curve.getPointAt(progress % 1);
    const lookAtPos = curve.getPointAt((progress + 0.01) % 1);
    camera.position.copy(camPos);
    camera.lookAt(lookAtPos);
    
    // UI Updates
    document.getElementById('depth').textContent = `DEPTH: ${Math.floor(progress * 5000)}m`;
    
    // Content Trigger Logic
    checkSection(progress, 0.1, 'p1');
    checkSection(progress, 0.4, 'p2');
    checkSection(progress, 0.8, 'p3');

    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}

function checkSection(prog, target, id) {
    const el = document.getElementById(id);
    if(prog > target && prog < target + 0.15) {
        el.classList.add('active');
    } else {
        el.classList.remove('active');
    }
}

lenis.on('scroll', (e) => { progress = e.progress; });

// Cursor
window.addEventListener('mousemove', (e) => {
    document.getElementById('cursor').style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
});

requestAnimationFrame(animate);
</script>
</body>
</html>
