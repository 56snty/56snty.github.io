<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium iGaming Platform</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="top-nav">
    <div class="logo">
      CASINO<span>.</span>
    </div>
    
    <div class="wallet-pill">
      <span class="balance">$0.00</span>
      <button class="btn-deposit">Deposit</button>
    </div>
  </nav>

  <main class="main-container">
    
    <section class="hero-card">
      <h1>Welcome Back, Player</h1>
      <p>Ready to hit the multipliers? Check out today's Case Battles.</p>
    </section>

    <h2 class="section-title">Originals</h2>
    <section class="game-grid">
      <div class="game-card" style="background-color: #1a1a2e;">
        <h3>Plinko</h3>
      </div>
      <div class="game-card" style="background-color: #2e1a1a;">
        <h3>Crash</h3>
      </div>
      <div class="game-card" style="background-color: #1a2e1e;">
        <h3>Mines</h3>
      </div>
    </section>

    <br><br>

    <h2 class="section-title">Trending Cases</h2>
    <section class="game-grid">
      <div class="game-card" style="border: 1px solid var(--accent-red);">
        <h3 style="color: var(--accent-red);">Legendary Box</h3>
      </div>
      <div class="game-card">
        <h3>Neon Drop</h3>
      </div>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
