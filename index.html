<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
    <title>EMAL // ELITE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.27/bundled/lenis.min.js"></script>
    <style>
        :root { --accent: #ffffff; --bg: #000000; }
        * { margin:0; padding:0; box-sizing:border-box; cursor: none; }
        body { background: var(--bg); color: #fff; font-family: "Inter", sans-serif; overflow-x:hidden; height: 1200vh; }
        
        #canvas-container { position:fixed; inset:0; z-index:0; filter: contrast(1.1) brightness(1.1); }
        
        /* The Igloo.inc Grain */
        .noise { position:fixed; inset:0; z-index:999; opacity:0.08; pointer-events:none; background:url('https://grainy-gradients.vercel.app/noise.svg'); filter: grayscale(1); }
        
        .hud { position:fixed; inset:0; padding:40px; z-index:100; pointer-events:none; }
        .nav { display:flex; justify-content:space-between; font-size:10px; letter-spacing:5px; font-weight:900; opacity: 0.4; }
        
        .content { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
        .card { 
            opacity: 0; transform: scale(1.2) rotateX(20deg); filter: blur(20px);
            transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
            text-align: center; 
        }
        .card.active { opacity: 1; transform: scale(1) rotateX(0deg); filter: blur(0px); }
        
        h2 { font-size: 15vw; font-weight: 900; letter-spacing: -0.07em; line-height: 0.8; text-transform: uppercase; font-style: italic; }
        p { font-size: 10px; letter-spacing: 10px; opacity: 0.3; margin-top: 20px; }

        #cursor { position: fixed; width: 40px; height: 40px; border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; pointer-events: none; z-index: 1000; transition: transform 0.15s cubic-bezier(0.23, 1, 0.32, 1); }
        #cursor-dot { position: fixed; width: 4px; height: 4px; background: #fff; border-radius: 50%; pointer-events: none; z-index: 1000; }
    </style>
</head>
<body>
    <div id="cursor"></div>
    <div id="cursor-dot"></div>
    <div class="noise"></div>
    <div id="canvas-container"></div>

    <div class="hud">
        <div class="nav">
            <div>EMAL.LABS / V12</div>
            <div>[ REALM_STATUS: HYPERFLOW ]</div>
        </div>
    </div>

    <div class="content"><div class="card" id="c1"><h2>VOID</h2><p>THE ARCHITECT</p></div></div>
    <div class="content"><div class="card" id="c2"><h2>MERGE</h2><p>CREATIVE SUITE</p></div></div>
    <div class="content"><div class="card" id="c3"><h2>BEYOND</h2><p>CONTACT_NODE</p></div></div>

<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.getElementById('canvas-container').appendChild(renderer.domElement);

// --- HYPER-REAL GLASS TUNNEL ---
const points = [];
for (let i = 0; i <= 30; i++) {
    points.push(new THREE.Vector3(Math.sin(i * 0.4) * 4, Math.cos(i * 0.4) * 4, i * 20));
}
const curve = new THREE.CatmullRomCurve3(points, true);
const tubeGeo = new THREE.TubeGeometry(curve, 256, 4, 32, true);

const material = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 }, uScroll: { value: 0 } },
    side: THREE.BackSide,
    transparent: true,
    vertexShader: `
        varying vec2 vUv;
        varying float vNoise;
        uniform float uTime;
        void main() {
            vUv = uv;
            vec3 p = position;
            vNoise = sin(p.z * 0.1 + uTime * 2.0);
            p.x += vNoise * 0.5;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);
        }
    `,
    fragmentShader: `
        varying vec2 vUv;
        varying float vNoise;
        uniform float uTime;
        void main() {
            vec3 color1 = vec3(0.02, 0.02, 0.03);
            vec3 color2 = vec3(0.4, 0.4, 0.45);
            float lines = step(0.98, sin(vUv.x * 200.0 + vNoise));
            vec3 final = mix(color1, color2, lines * 0.2);
            float alpha = smoothstep(0.0, 1.0, vUv.y);
            gl_FragColor = vec4(final + (vNoise * 0.05), 0.8);
        }
    `
});

const tunnel = new THREE.Mesh(tubeGeo, material);
scene.add(tunnel);

// Star Dust
const stars = new THREE.Points(
    new THREE.BufferGeometry().setFromPoints(Array(8000).fill().map(() => new THREE.Vector3((Math.random()-0.5)*150, (Math.random()-0.5)*150, Math.random()*800))),
    new THREE.PointsMaterial({ color: 0xffffff, size: 0.02, transparent: true, opacity: 0.4 })
);
scene.add(stars);

// --- SCROLL ENGINE ---
const lenis = new Lenis({ lerp: 0.03, smoothWheel: true });
let scrollProgress = 0;

function animate(t) {
    lenis.raf(t);
    const loop = (scrollProgress % 1 + 1) % 1;
    camera.position.copy(curve.getPointAt(loop));
    camera.lookAt(curve.getPointAt((loop + 0.01) % 1));
    camera.rotation.z += t * 0.0002;

    material.uniforms.uTime.value = t * 0.001;
    
    check(loop, 0.1, 'c1');
    check(loop, 0.4, 'c2');
    check(loop, 0.8, 'c3');

    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}

function check(p, target, id) {
    const el = document.getElementById(id);
    el.classList.toggle('active', p > target && p < target + 0.15);
}

lenis.on('scroll', (e) => { scrollProgress = e.animatedScroll / 12000; });

window.addEventListener('mousemove', (e) => {
    document.getElementById('cursor').style.transform = `translate(${e.clientX - 20}px, ${e.clientY - 20}px)`;
    document.getElementById('cursor-dot').style.transform = `translate(${e.clientX - 2}px, ${e.clientY - 2}px)`;
});

requestAnimationFrame(animate);
</script>
</body>
</html>
